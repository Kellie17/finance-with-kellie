<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance with Kellie - Bot Walkthrough</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0e1621;
    font-family: 'Inter', -apple-system, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .phone {
    width: 390px;
    height: 844px;
    background: #17212b;
    border-radius: 40px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 0 3px #2a3a4a, 0 20px 60px rgba(0,0,0,0.5);
  }

  @media (max-width: 430px) {
    body {
      padding: 12px 0;
      overflow-y: auto;
      align-items: flex-start;
    }
    .phone {
      width: 86vw;
      height: 82vh;
      border-radius: 32px;
      margin: 0 auto;
      flex-shrink: 0;
    }
    .chat-area { height: calc(82vh - 160px); }
    .header { padding-top: 30px; }
  }

  .header {
    background: #1f2936;
    padding: 50px 16px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid #0e1621;
    position: relative;
    z-index: 10;
  }

  .header-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c6aef, #a78bfa);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: white;
  }

  .header-info h3 { color: #e1e3e6; font-size: 15px; font-weight: 600; }
  .header-info span { color: #6c7883; font-size: 12px; }

  .chat-area {
    height: 690px;
    overflow-y: auto;
    padding: 12px 8px 80px;
    scroll-behavior: smooth;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .chat-area::-webkit-scrollbar { display: none; }

  .msg {
    max-width: 300px;
    padding: 8px 12px;
    border-radius: 12px;
    margin-bottom: 6px;
    font-size: 14px;
    line-height: 1.5;
    opacity: 0;
    transform: translateY(15px);
    animation: msgIn 0.35s ease forwards;
    position: relative;
  }

  @keyframes msgIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    background: #766ac8;
    color: white;
    margin-left: auto;
    border-bottom-right-radius: 4px;
    font-weight: 500;
  }

  .msg.bot {
    background: #182533;
    color: #e1e3e6;
    margin-right: auto;
    border-bottom-left-radius: 4px;
  }

  .msg b { color: #e1e3e6; }
  .msg .cmd { color: #7cacf8; }
  .msg .emoji { font-size: 15px; }
  .msg .section-header { color: #e1e3e6; font-weight: 600; display: block; margin-top: 6px; }
  .msg .dim { color: #6c7883; font-style: italic; font-size: 13px; }
  .msg .source { color: #6c7883; font-size: 12px; }
  .msg .highlight { color: #7cacf8; }
  .msg .cta { color: #a78bfa; font-style: italic; font-size: 13px; display: block; margin-top: 6px; }
  .msg .whatsapp { color: #25d366; font-weight: 500; }

  .msg-time {
    color: #4a5968;
    font-size: 10px;
    text-align: right;
    margin-top: 2px;
  }

  .typing {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    opacity: 0;
    animation: msgIn 0.3s ease forwards;
  }
  .typing span {
    width: 8px; height: 8px;
    background: #4a5968;
    border-radius: 50%;
    animation: typingDot 1.2s ease infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingDot {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  .input-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: #1f2936;
    padding: 10px 12px 30px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-top: 1px solid #0e1621;
  }

  .input-field {
    flex: 1;
    background: #242f3d;
    border: none;
    border-radius: 20px;
    padding: 10px 16px;
    color: #e1e3e6;
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  .input-field::placeholder { color: #4a5968; }

  .send-btn {
    width: 36px; height: 36px;
    background: #766ac8;
    border: none; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .send-btn svg { fill: white; width: 16px; height: 16px; }

  .scene-label {
    text-align: center;
    padding: 8px;
    margin: 8px 0;
    opacity: 0;
    animation: msgIn 0.5s ease forwards;
  }
  .scene-label span {
    background: #1f2936;
    color: #6c7883;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 10px;
  }

  .narrator {
    position: absolute;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(118,106,200,0.95);
    color: white;
    padding: 10px 20px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 500;
    text-align: center;
    opacity: 0;
    transition: opacity 0.4s;
    z-index: 20;
    width: 340px;
    pointer-events: none;
  }
  .narrator.show { opacity: 1; }

  .progress-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: #0e1621;
    z-index: 20;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #766ac8, #a78bfa);
    width: 0%;
    transition: width 0.5s ease;
  }

  .replay-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: #766ac8;
    color: white;
    border: none;
    padding: 14px 32px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    display: none;
    z-index: 30;
    box-shadow: 0 4px 20px rgba(118,106,200,0.4);
  }
  .replay-btn:hover { background: #8b7fd4; }
</style>
</head>
<body>

<div class="phone">
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

  <div class="header">
    <div class="header-avatar">F</div>
    <div class="header-info">
      <h3>Finance with Kellie</h3>
      <span>bot</span>
    </div>
  </div>

  <div class="chat-area" id="chat"></div>

  <div class="narrator" id="narrator"></div>

  <div class="input-bar">
    <input class="input-field" placeholder="Message" readonly id="inputField">
    <div class="send-btn">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </div>
  </div>

</div>

<script>
const chat = document.getElementById('chat');
const narrator = document.getElementById('narrator');
const progress = document.getElementById('progress');
const inputField = document.getElementById('inputField');
const replayBtn = document.getElementById('replayBtn');

const totalScenes = 11;
let sceneIndex = 0;

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function scrollDown() {
  chat.scrollTop = chat.scrollHeight;
}

function setProgress(scene) {
  progress.style.width = ((scene / totalScenes) * 100) + '%';
}

function showNarrator(text, duration = 2500) {
  narrator.textContent = text;
  narrator.classList.add('show');
  return sleep(duration).then(() => narrator.classList.remove('show'));
}

function addMsg(type, html, delay = 0) {
  return sleep(delay).then(() => {
    const div = document.createElement('div');
    div.className = 'msg ' + type;
    div.innerHTML = html;
    chat.appendChild(div);
    scrollDown();
    return sleep(100);
  });
}

function addLabel(text, delay = 0) {
  return sleep(delay).then(() => {
    const div = document.createElement('div');
    div.className = 'scene-label';
    div.innerHTML = '<span>' + text + '</span>';
    chat.appendChild(div);
    scrollDown();
  });
}

function showTyping(duration = 1200) {
  const div = document.createElement('div');
  div.className = 'msg bot typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(div);
  scrollDown();
  return sleep(duration).then(() => {
    div.remove();
  });
}

function typeInput(text, duration = 600) {
  inputField.value = '';
  let i = 0;
  const step = duration / text.length;
  return new Promise(resolve => {
    const interval = setInterval(() => {
      inputField.value = text.substring(0, ++i);
      if (i >= text.length) { clearInterval(interval); setTimeout(() => { inputField.value = ''; resolve(); }, 300); }
    }, step);
  });
}
