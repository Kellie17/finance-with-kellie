<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Wealth Blueprint | Finance with Kellie</title>
  <style>
    :root {
      --navy: #16243d;
      --ink: #172334;
      --muted: #6f6b5d;
      --line: #e3d9c2;
      --soft: #f6f1e7;
      --panel: #ffffff;
      --red: #cf142b;
      --red-soft: #fff0f1;
      --green: #1f7a5c;
      --green-soft: #edf8f3;
      --amber: #b7791f;
      --amber-soft: #fff7e6;
      --orange: #c65f13;
      --orange-soft: #fff3e8;
      --blue-soft: #eef5fc;
      --gold: #c9a227;
      --gold-strong: #a8861d;
      --gold-soft: #f6ecce;
      --cream: #f5efe2;
      --shadow: 0 16px 40px rgba(23, 35, 52, 0.10);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(246, 241, 231, 0.98), rgba(240, 232, 216, 0.94)),
        #f6f1e7;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:focus-visible,
    input:focus-visible,
    .drop-zone:focus-visible {
      outline: 3px solid rgba(201, 162, 39, 0.5);
      outline-offset: 2px;
    }

    .app-header {
      min-height: 76px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 18px;
      padding: 14px 22px;
      border-bottom: 2px solid var(--gold);
      background: var(--navy);
      position: sticky;
      top: 0;
      z-index: 30;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand img {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--gold);
      box-shadow: 0 8px 22px rgba(6, 12, 24, 0.45);
      flex: 0 0 auto;
    }

    .brand small,
    .panel-label {
      display: block;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .brand small {
      color: #d9bc63;
    }

    .brand h1 {
      margin: 1px 0 0;
      color: var(--cream);
      font-size: clamp(1.08rem, 1.6vw, 1.45rem);
      line-height: 1.1;
      letter-spacing: 0;
      white-space: normal;
    }

    .header-actions {
      flex: 1 1 540px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .progress-pill {
      color: var(--cream);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(201, 162, 39, 0.55);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.9rem;
      font-weight: 750;
      white-space: nowrap;
    }

    .control-button {
      min-height: 38px;
      border: 1px solid var(--line);
      color: var(--ink);
      background: #ffffff;
      border-radius: var(--radius);
      padding: 8px 12px;
      font-weight: 750;
      transition: transform 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
    }

    .control-button:hover {
      border-color: #b89a55;
      box-shadow: 0 8px 18px rgba(23, 35, 52, 0.08);
      transform: translateY(-1px);
    }

    .control-button.primary {
      color: var(--navy);
      background: var(--gold);
      border-color: var(--gold);
    }

    .language-button {
      min-width: 68px;
    }

    .language-button.active {
      color: var(--navy);
      background: var(--gold);
      border-color: var(--gold);
    }

    .dual-text {
      display: inline-flex;
      flex-direction: column;
      gap: 2px;
      line-height: 1.16;
      vertical-align: middle;
    }

    .dual-text.inline {
      display: inline;
      line-height: inherit;
    }

    .dual-text.inline .cn-text {
      margin-left: 0.35em;
    }

    .cn-text {
      color: var(--muted);
      font-size: 0.82em;
      font-weight: 650;
      letter-spacing: 0;
      text-transform: none;
    }

    .brand .cn-text,
    .app-header .cn-text {
      color: #f0dfab;
    }

    .placed-card .cn-text,
    .step-text .cn-text {
      font-size: 0.76em;
    }

    .report-table .cn-text,
    .report-card .cn-text,
    .report-kpi .cn-text {
      font-size: 0.78em;
    }

    .control-button.danger {
      color: var(--red);
      border-color: rgba(207, 20, 43, 0.28);
      background: var(--red-soft);
    }

    .control-button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
      box-shadow: none;
      transform: none;
    }

    .app-header .control-button {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(245, 239, 226, 0.32);
      color: var(--cream);
    }

    .app-header .control-button:hover {
      border-color: var(--gold);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.28);
    }

    .app-header .control-button.primary {
      color: var(--navy);
      background: var(--gold);
      border-color: var(--gold);
    }

    .app-header .control-button.danger {
      color: #ffb3bb;
      border-color: rgba(255, 138, 150, 0.45);
      background: rgba(207, 20, 43, 0.16);
    }

    .app-shell {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 16px;
      padding: 16px;
      min-height: calc(100vh - 76px);
    }

    .step-rail,
    .stage-shell {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .step-rail {
      padding: 12px;
      align-self: start;
      position: sticky;
      top: 92px;
    }

    .step-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .step-button {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      width: 100%;
      min-height: 54px;
      text-align: left;
      border: 1px solid transparent;
      background: transparent;
      border-radius: var(--radius);
      padding: 8px;
      color: var(--ink);
    }

    .step-button:hover {
      background: var(--soft);
    }

    .step-button.active {
      background: var(--gold-soft);
      border-color: var(--gold);
    }

    .step-number {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #ffffff;
      background: var(--navy);
      font-weight: 850;
    }

    .step-button.done .step-number {
      background: var(--green);
    }

    .step-text {
      min-width: 0;
    }

    .step-text strong {
      display: block;
      font-size: 0.88rem;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .step-text span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.78rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stage-shell {
      min-width: 0;
      overflow: hidden;
    }

    .stage-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 20px 12px;
      border-bottom: 1px solid var(--line);
    }

    .stage-title {
      min-width: 0;
    }

    .stage-title h2 {
      margin: 2px 0 5px;
      color: var(--navy);
      font-size: clamp(1.18rem, 2vw, 1.65rem);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .stage-title p {
      margin: 0;
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.35;
    }

    .stage-metrics {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .metric-chip {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
      color: var(--navy);
      background: #ffffff;
      font-size: 0.85rem;
      font-weight: 750;
      white-space: nowrap;
    }

    .canvas-wrap {
      padding: 18px 20px 20px;
      overflow: auto;
    }

    .canvas {
      position: relative;
      min-height: 700px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(90deg, rgba(168, 134, 29, 0.06) 1px, transparent 1px),
        linear-gradient(180deg, rgba(22, 36, 61, 0.05) 1px, transparent 1px),
        #ffffff;
      background-size: 44px 44px;
      overflow: hidden;
    }

    .canvas.funds-canvas {
      min-height: 880px;
    }

    .canvas.checkin-canvas {
      min-height: 880px;
    }

    .diagram-title {
      position: absolute;
      top: 18px;
      left: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--navy);
      font-weight: 850;
      font-size: 1rem;
      z-index: 3;
    }

    .diagram-title .bubble {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #ffffff;
      background: var(--navy);
      font-weight: 900;
    }

    .drop-zone {
      position: absolute;
      min-width: 104px;
      min-height: 52px;
      border: 1.5px dashed #b89a55;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.72);
      transition: border-color 140ms ease, background 140ms ease, transform 140ms ease, box-shadow 140ms ease;
      z-index: 5;
    }

    .drop-zone:hover,
    .drop-zone.target-hover {
      border-color: var(--green);
      background: #ffffff;
      box-shadow: 0 10px 22px rgba(23, 35, 52, 0.10);
      transform: translateY(-1px);
    }

    .drop-zone.invalid {
      border-color: var(--red);
      background: var(--red-soft);
      animation: shake 220ms ease;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      35% { transform: translateX(-5px); }
      70% { transform: translateX(5px); }
      100% { transform: translateX(0); }
    }

    .placed-card {
      width: 100%;
      height: 100%;
      min-height: inherit;
      display: grid;
      align-content: center;
      gap: 4px;
      padding: 10px 12px;
      border-radius: calc(var(--radius) - 1px);
      border: 1.5px solid var(--navy);
      background: var(--blue-soft);
      color: var(--ink);
      overflow: hidden;
    }

    .placed-card.red {
      border-color: var(--red);
      background: var(--red-soft);
    }

    .placed-card.green {
      border-color: var(--green);
      background: var(--green-soft);
    }

    .placed-card.amber {
      border-color: var(--amber);
      background: var(--amber-soft);
    }

    .placed-card strong {
      display: block;
      color: inherit;
      font-size: clamp(0.82rem, 1.2vw, 1rem);
      line-height: 1.08;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .placed-card span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.16;
      overflow-wrap: anywhere;
    }

    .placed-card b {
      color: inherit;
      font-weight: 850;
    }

    .drag-ghost {
      position: fixed;
      z-index: 1000;
      pointer-events: none;
      width: min(270px, 72vw);
      opacity: 0.96;
      transform: translate(-50%, -50%);
      box-shadow: 0 18px 46px rgba(23, 35, 52, 0.22);
    }

    .axis-label {
      position: absolute;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      z-index: 2;
    }

    .asset-board {
      position: absolute;
      inset: 66px 34px 34px;
    }

    .asset-axis {
      position: absolute;
      left: 12px;
      top: 42px;
      bottom: 42px;
      width: 1.5px;
      background: #718096;
    }

    .asset-axis:before,
    .asset-axis:after {
      content: "";
      position: absolute;
      left: -4px;
      width: 9px;
      height: 9px;
      border-left: 1.5px solid #718096;
      border-top: 1.5px solid #718096;
    }

    .asset-axis:before {
      top: -1px;
      transform: rotate(45deg);
    }

    .asset-axis:after {
      bottom: -1px;
      transform: rotate(225deg);
    }

    .asset-inflation {
      position: absolute;
      left: 86px;
      right: 36px;
      top: 49.5%;
      border-top: 2px dashed var(--red);
      z-index: 1;
      opacity: 0;
      transition: opacity 180ms ease;
    }

    .asset-inflation.visible {
      opacity: 1;
    }

    .asset-inflation span {
      position: absolute;
      top: -30px;
      left: 0;
      color: var(--red);
      font-size: 0.78rem;
      font-weight: 800;
      background: #ffffff;
      padding-right: 8px;
      line-height: 1.08;
      white-space: nowrap;
    }

    .asset-inflation-zone {
      position: absolute;
      left: 84px;
      right: 116px;
      top: 46.5%;
      min-height: 38px;
      z-index: 5;
      opacity: 0;
      pointer-events: none;
    }

    .asset-inflation-zone .placed-card {
      display: none;
    }

    .asset-range-head {
      position: absolute;
      right: 0;
      top: 8px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .asset-slot {
      left: 84px;
      right: 116px;
      min-height: 38px;
    }

    .asset-slot .placed-card {
      min-height: 38px;
      grid-template-columns: 190px minmax(120px, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding-top: 6px;
      padding-bottom: 6px;
    }

    .asset-slot .placed-card .range {
      display: grid;
    }

    .asset-range {
      position: absolute;
      right: 12px;
      width: 92px;
      color: var(--navy);
      font-size: 0.86rem;
      font-weight: 850;
      line-height: 38px;
      z-index: 2;
    }

    .asset-range.red {
      color: var(--red);
    }

    .asset-range.green {
      color: var(--green);
    }

    .asset-range.amber {
      color: var(--amber);
    }

    .focus-zone {
      position: absolute;
      left: 70px;
      right: 104px;
      top: 19%;
      height: 26.2%;
      border: 2px solid rgba(31, 122, 92, 0.7);
      border-radius: var(--radius);
      background: rgba(31, 122, 92, 0.05);
      z-index: 0;
      opacity: 0;
      transition: opacity 180ms ease;
    }

    .focus-zone.visible {
      opacity: 1;
    }

    .focus-zone span {
      position: absolute;
      right: 10px;
      bottom: -17px;
      max-width: calc(100% - 20px);
      color: var(--green);
      font-size: 0.72rem;
      font-weight: 850;
      background: #ffffff;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(31, 122, 92, 0.25);
      z-index: 4;
      line-height: 1.08;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .asset-bank-note {
      position: absolute;
      left: 260px;
      right: 250px;
      top: 87%;
      min-height: 66px;
      color: var(--green);
      font-weight: 780;
      text-align: center;
      z-index: 6;
      pointer-events: none;
    }

    .asset-bank-note-card {
      display: inline-grid;
      gap: 2px;
      width: 330px;
      max-width: 100%;
      padding: 7px 14px;
      border: 2px solid var(--green);
      border-radius: 18px;
      background: rgba(237, 248, 243, 0.96);
      line-height: 1.12;
      box-shadow: 0 8px 20px rgba(31, 122, 92, 0.08);
    }

    .asset-bank-note-card strong {
      color: var(--green);
      font-size: 0.76rem;
      line-height: 1.08;
      overflow-wrap: anywhere;
    }

    .asset-bank-note-card .asset-bank-note-title {
      color: var(--green);
      font-size: 0.62rem;
      font-weight: 900;
      line-height: 1.08;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .asset-bank-note-card span {
      color: var(--green);
      font-size: 0.62rem;
      line-height: 1.18;
    }

    .asset-bonus-zone {
      position: absolute;
      left: 84px;
      right: 116px;
      top: 84%;
      min-height: 40px;
      z-index: 5;
      opacity: 0;
      pointer-events: none;
    }

    .asset-bonus-zone .placed-card {
      display: none;
    }

    .readiness-baseline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 6px 0 10px;
      padding: 10px 12px;
      border: 2px solid rgba(183, 121, 31, 0.46);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(255, 247, 230, 0.98), rgba(246, 236, 206, 0.86)),
        #ffffff;
      color: var(--amber);
      font-size: 0.78rem;
      font-weight: 850;
      line-height: 1.18;
      box-shadow: 0 8px 20px rgba(183, 121, 31, 0.08);
    }

    .readiness-baseline-title {
      min-width: 176px;
      color: var(--amber);
      font-size: 0.9rem;
      font-weight: 950;
    }

    .readiness-baseline-chips {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .readiness-baseline-chip {
      display: grid;
      place-items: center;
      min-height: 38px;
      padding: 6px 8px;
      border: 1px solid rgba(183, 121, 31, 0.32);
      border-radius: 999px;
      background: rgba(255, 253, 246, 0.94);
      color: var(--navy);
      text-align: center;
      font-size: 0.72rem;
      font-weight: 900;
    }

    .readiness-baseline-chip .cn-text {
      color: var(--muted);
      font-size: 0.82em;
    }

    .readiness-baseline span:last-child:not(.readiness-baseline-chip) {
      color: var(--muted);
      font-weight: 760;
      text-align: right;
    }

    .var-reveal-return {
      animation: stagedReveal 180ms ease both;
    }

    .var-reveal-risk {
      animation: stagedReveal 180ms ease 180ms both;
    }

    .var-reveal-time {
      animation: stagedReveal 180ms ease 360ms both;
    }

    .var-reveal-shortcut {
      animation: stagedReveal 180ms ease 540ms both;
    }

    .var-step-circle {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      animation: varCirclePop 520ms ease forwards;
    }

    .var-circle-return {
      animation-delay: 120ms;
    }

    .var-circle-risk {
      animation-delay: 720ms;
    }

    .var-circle-time {
      animation-delay: 1320ms;
    }

    @keyframes varCirclePop {
      from {
        opacity: 0;
        transform: scale(0.68);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes stagedReveal {
      from {
        opacity: 0;
        transform: scale(0.94);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .svg-board {
      position: absolute;
      inset: 76px 24px 24px;
    }

    .svg-board svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .graph-zone {
      min-width: 132px;
      min-height: 58px;
    }

    .story-zone {
      min-width: 76px;
      min-height: 48px;
    }

    .story-zone .placed-card {
      padding: 6px 7px;
      gap: 2px;
    }

    .story-zone .placed-card strong {
      font-size: 0.7rem;
      line-height: 1.05;
    }

    .story-zone .placed-card span,
    .story-zone .placed-card .range {
      display: none;
    }

    .dca-board,
    .variables-board,
    .downtrend-board,
    .funds-board {
      position: absolute;
      inset: 78px 34px 34px;
    }

    .equation-board,
    .timeline-board,
    .retire-board,
    .retirement-board,
    .lifestyle-board,
    .math-board,
    .methods-board,
    .secret-board {
      position: absolute;
      inset: 78px 34px 34px;
    }

    .dca-board svg,
    .variables-board svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .downtrend-board {
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
      color: var(--navy);
    }

    .downtrend-hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px;
      gap: 18px;
      align-items: stretch;
    }

    .downtrend-statement {
      border: 2px solid var(--navy);
      border-radius: var(--radius);
      background: #ffffff;
      padding: 18px 20px;
      box-shadow: 0 14px 34px rgba(29, 61, 104, 0.08);
    }

    .downtrend-statement span {
      display: inline-flex;
      margin-bottom: 8px;
      color: var(--red);
      font-size: 0.86rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .downtrend-statement strong {
      display: block;
      font-size: clamp(1.45rem, 2.8vw, 2.15rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .downtrend-chart-card {
      border: 1.5px solid #e0d6bc;
      border-radius: var(--radius);

      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .report-formula {
      display: grid;
      gap: 8px;
      padding: 14px;
      border: 2px solid var(--navy);
      border-radius: var(--radius);
      color: var(--navy);
      background: #ffffff;
      text-align: center;
      font-weight: 900;
    }

    .report-formula .circled {
      display: inline-grid;
      place-items: center;
      min-width: 92px;
      min-height: 56px;
      padding: 6px 12px;
      border: 3px solid var(--red);
      border-radius: 50%;
      color: var(--green);
      background: #ffffff;
    }

      .report-secret-snapshot {
        display: grid;
        grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
        gap: 14px;
      }

    .report-secret-snapshot .report-formula {
      min-height: 84px;
      align-content: center;
    }

    .report-secret-snapshot .wide {
      grid-column: 1 / -1;
    }

    .report-secret-rate,
    .report-secret-note {
      border: 1px solid #e6dcc6;
      border-radius: var(--radius);
      background: #ffffff;
      padding: 14px;
    }

    .report-secret-rate h4,
    .report-secret-note h4,
    .report-secret-monthly h4 {
      margin: 0 0 6px;
      color: var(--navy);
      font-size: 0.98rem;
    }

    .report-secret-rate strong {
      display: block;
      color: var(--green);
      font-size: 1.55rem;
      line-height: 1.05;
      font-weight: 950;
    }

    .report-secret-rate p,
    .report-secret-note p,
    .report-secret-monthly p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.3;
      font-weight: 700;
    }

    .report-secret-note {
      grid-column: 1 / -1;
      border-color: rgba(183, 121, 31, 0.32);
      background: var(--amber-soft);
    }

    .report-secret-note.green {
      border-color: rgba(31, 122, 92, 0.30);
      background: var(--green-soft);
    }

    .report-secret-monthly {
      grid-column: 1 / -1;
      border: 2px solid var(--green);
      border-radius: var(--radius);
      background: var(--green-soft);
      padding: 14px;
      text-align: center;
    }

    .report-secret-monthly strong {
      display: block;
      color: var(--green);
      font-size: 1.85rem;
      line-height: 1.05;
      font-weight: 950;
    }

    .report-disclaimer {
      margin-top: 22px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.76rem;
      line-height: 1.35;
    }

    .report-copyright {
      margin-top: 16px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
      text-align: center;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 650;
      letter-spacing: 0.02em;
    }

        size: A4;
        margin: 0;

      .profile-report a[href]::after {

        top: -8px;

      .report-card,

      .report-note-box,
      .report-formula {
        break-inside: avoid;
      }

      .report-secret-snapshot {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 12px;

      .report-funding-section .report-secret-snapshot {
        margin-top: 8px;

      .report-secret-snapshot .report-formula,

    @media (max-width: 1366px) {

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function validPlacedMap(rawPlaced = {}) {
      return Object.fromEntries(STEPS.map((pitchStep) => {
        const validItems = new Map(pitchStep.items.map((item) => [item.target, item.id]));
        const source = rawPlaced[pitchStep.id] && typeof rawPlaced[pitchStep.id] === "object"
          ? rawPlaced[pitchStep.id]
          : {};
        const cleanEntries = Object.entries(source).filter(([target, itemId]) => validItems.get(target) === itemId);
        return [pitchStep.id, Object.fromEntries(cleanEntries)];
      }));
    }

    function normaliseStateShape() {
      state.current = Math.min(Math.max(Number(state.current) || 0, 0), STEPS.length - 1);
      state.placed = validPlacedMap(state.placed);
      state.selectedItem = null;
      state.lastItem = null;
      state.present = Boolean(state.present);
      state.language = state.language === "english" ? "english" : "bilingual";
      state.lifestyleChoice = ["essential", "discretionary", "luxury"].includes(state.lifestyleChoice) ? state.lifestyleChoice : "";
      state.calc = { ...clone(DEFAULT_STATE.calc), ...(state.calc || {}) };
      Object.keys(state.calc).forEach((key) => {
        const value = Number(state.calc[key]);
        state.calc[key] = Number.isFinite(value) ? value : DEFAULT_STATE.calc[key];
      });
      state.report = {
        ...clone(DEFAULT_STATE.report),
        ...(state.report || {}),
        sections: {
          ...clone(DEFAULT_STATE.report.sections),
          ...((state.report && state.report.sections) || {})
        }
      };
      state.report.prospectName = String(state.report.prospectName || "");
      state.report.meetingDate = String(state.report.meetingDate || "");
      state.report.notes = String(state.report.notes || "");
      state.report.concerns = Array.isArray(state.report.concerns)
        ? state.report.concerns.filter((id) => concernById(id))
        : [];
    }

    function loadSavedState() {
      try {
        const saved = JSON.parse(window.localStorage.getItem(STORAGE_KEY) || "null");
        if (saved && typeof saved === "object") {
          state.current = saved.current ?? state.current;
          state.placed = saved.placed ?? state.placed;
          state.present = saved.present ?? state.present;
          state.language = saved.language ?? state.language;
          state.lifestyleChoice = saved.lifestyleChoice ?? state.lifestyleChoice;
          state.calc = { ...state.calc, ...(saved.calc || {}) };
          state.report = {
            ...state.report,
            ...(saved.report || {}),
            sections: {
              ...state.report.sections,
              ...((saved.report && saved.report.sections) || {})
            }
          };
          if (saved.calc && saved.calc.moodScaleDirection !== 2) {
            ["moodSavings", "moodSpending", "moodIncome"].forEach((key) => {
              const oldValue = Math.min(Math.max(Number(state.calc[key]) || 3, 1), 5);
              state.calc[key] = 6 - oldValue;
            });
            state.calc.moodScaleDirection = 2;
          }
          if (saved.calc && saved.calc.expectancyDefaultUpdated !== 1 && Number(saved.calc.expectancyAge) === 85) {
            state.calc.expectancyAge = 86;
            state.calc.expectancyDefaultUpdated = 1;
          }
        }
      } catch (error) {
        try {
          window.localStorage.removeItem(STORAGE_KEY);
        } catch (storageError) {
          state.present = false;
        }
      }
      normaliseStateShape();
    }

    function saveState() {
      const payload = {
        current: state.current,
        placed: state.placed,
        present: state.present,
        language: state.language,
        lifestyleChoice: state.lifestyleChoice,
        calc: state.calc,
        report: state.report
      };
      try {
        window.localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      } catch (error) {}
    }

    function totalPlacedCount() {
      return STEPS.reduce((sum, pitchStep) => sum + placedCount(pitchStep), 0);
    }

    function step() {
      return STEPS[state.current];
    }

    function placedFor(currentStep = step()) {
      return state.placed[currentStep.id];
    }

    function placedCount(currentStep = step()) {
      return Object.keys(placedFor(currentStep)).length;
    }

    function getItem(itemId, currentStep = step()) {
      return currentStep.items.find((item) => item.id === itemId);
    }

    function getPlacedItemAt(target, currentStep = step()) {
      const itemId = placedFor(currentStep)[target];
      return itemId ? getItem(itemId, currentStep) : null;
    }

    function nextUnplaced(currentStep = step()) {
      return currentStep.reveal.find((itemId) => !Object.values(placedFor(currentStep)).includes(itemId));
    }

    function allStepDone(currentStep) {
      return placedCount(currentStep) === currentStep.items.length;
    }

    function isBilingual() {
      return state.language !== "english";
    }

    function isChineseOnly() {
      return state.language === "chinese";
    }

    function cnText(value) {
      return CN_TEXT[String(value ?? "")] || "";
    }

    function pairText(en, cn) {
      if (isChineseOnly() && cn) return cn;
      return isBilingual() && cn ? `${en} / ${cn}` : en;
    }

    function translatedText(value) {
      const text = String(value ?? "");
      return pairText(text, cnText(text));
    }

    function pairHtml(en, cn, className = "dual-text") {
      if (isChineseOnly() && cn) return escapeHtml(cn);
      if (!isBilingual() || !cn) return escapeHtml(en);
      return `<span class="${className}"><span>${escapeHtml(en)}</span><span class="cn-text">${escapeHtml(cn)}</span></span>`;
    }

    function translatedHtml(value, className = "dual-text") {
      const text = String(value ?? "");
      return pairHtml(text, cnText(text), className);
    }

    function inlineTranslatedHtml(value) {
      return translatedHtml(value, "dual-text inline");
    }

    function withReportLanguageOutput(callback) {
      const originalLanguage = state.language;
      state.language = originalLanguage === "english" ? "english" : "chinese";
      try {
        return callback();
      } finally {
        state.language = originalLanguage;
      }
    }

    function svgInlineText(value, x, y, attrs = "") {
      return `<text x="${x}" y="${y}" ${attrs}>${escapeHtml(translatedText(value))}</text>`;
    }

    function svgDualText(value, x, y, attrs = "", lineGap = 15) {
      const text = String(value ?? "");
      const cn = cnText(text);
      if (!isBilingual() || !cn) {
        return `<text x="${x}" y="${y}" ${attrs}>${escapeHtml(text)}</text>`;
      }
      return `<text x="${x}" y="${y}" ${attrs}><tspan x="${x}">${escapeHtml(text)}</tspan><tspan x="${x}" dy="${lineGap}">${escapeHtml(cn)}</tspan></text>`;
    }

    function svgTextBlock(lines, x, y, attrs = "", lineGap = 18) {
      const textLines = lines.map((line) => String(line ?? ""));
      const joined = textLines.join(" ");
      const cn = cnText(joined);
      if (isBilingual() && cn) {
        return `<text x="${x}" y="${y}" ${attrs}><tspan x="${x}">${escapeHtml(joined)}</tspan><tspan x="${x}" dy="${lineGap}">${escapeHtml(cn)}</tspan></text>`;
      }
      return `<text x="${x}" y="${y}" ${attrs}>${textLines.map((line, index) => `<tspan x="${x}"${index ? ` dy="${lineGap}"` : ""}>${escapeHtml(line)}</tspan>`).join("")}</text>`;
    }

    function stepProgressText(currentStep) {
      return pairText(`Step ${currentStep.num} of ${DISPLAY_STEP_TOTAL}`, `第 ${currentStep.num} 步，共 ${DISPLAY_STEP_TOTAL} 步`);
    }

    function placedProgressText(count, total) {
      return pairText(`${count} of ${total} placed`, `已放置 ${count} / ${total}`);
    }

    function conceptText(num) {
      return pairText(`Concept ${num}`, `概念 ${num}`);
    }

    function nextMetricHtml(item) {
      if (!item) return translatedHtml("Complete");
      const en = `Next: ${item.label}`;
      const cn = cnText(item.label) ? `下一个：${cnText(item.label)}` : "";
      return pairHtml(en, cn);
    }

    function toneClass(item) {
      return item?.tone === "red" ? "red" : item?.tone === "green" ? "green" : item?.tone === "amber" ? "amber" : "";
    }

    function cardHtml(item) {
      if (!item) return "";
      const tone = toneClass(item);
      const range = item.range ? `<span class="range">${escapeHtml(item.range)}</span>` : "";
      return `

    function zoneHtml(target, className, style = "") {
      const item = getPlacedItemAt(target);
      const label = item ? `${translatedText(item.label)}, placed` : `slot ${target}`;
      return `
        <button class="drop-zone ${className}" data-target="${escapeHtml(target)}" aria-label="${escapeHtml(label)}" style="${style}">
          ${cardHtml(item)}
        </button>
      `;

    function render() {
      const currentStep = step();
      const count = placedCount(currentStep);
      const total = currentStep.items.length;
      const nextId = nextUnplaced(currentStep);
      const nextItem = nextId ? getItem(nextId, currentStep) : null;
      const activeItem = state.lastItem && getItem(state.lastItem, currentStep) ? getItem(state.lastItem, currentStep) : nextItem;

      renderChromeLabels();
      renderStepList();
      el.globalProgress.textContent = stepProgressText(currentStep);
      el.stageKicker.textContent = conceptText(currentStep.num);
      el.stageTitle.innerHTML = translatedHtml(currentStep.title);
      el.stageSub.innerHTML = translatedHtml(currentStep.subtitle);
      el.placedMetric.textContent = placedProgressText(count, total);
      el.nextMetric.innerHTML = nextMetricHtml(nextItem);
      el.prevBtn.disabled = state.current === 0;
      el.backBtn.disabled = count === 0;
      el.nextBtn.disabled = state.current === STEPS.length - 1;
      el.revealBtn.disabled = !nextItem;
      el.revealAllBtn.disabled = count === total;
      el.resetAllBtn.disabled = totalPlacedCount() === 0
        && state.current === 0
        && JSON.stringify(state.calc) === JSON.stringify(DEFAULT_STATE.calc)
        && JSON.stringify(state.report) === JSON.stringify(DEFAULT_STATE.report);
      el.body.classList.toggle("present-mode", state.present);

      renderCanvas(currentStep);
      wireTargets();
      wireLifestyleCards();
      wireMoodControls();
      wireConcernChips();
      if (["timeline", "checkIn", "retirementPlan", "lifestyle", "mathTime", "methods", "secret"].includes(currentStep.renderer)) {
        wireCalcInputs();
      }
      saveState();
    }

      el.stepList.innerHTML = STEPS.map((item, index) => {
        const active = index === state.current ? "active" : "";
        const done = allStepDone(item) ? "done" : "";
        return `
          <button class="step-button ${active} ${done}" type="button" data-step-index="${index}">
              <span class="step-number">${item.num}</span>
              <span class="step-text">
              <strong>${translatedHtml(item.short)}</strong>
              <span>${placedProgressText(placedCount(item), item.items.length)}</span>
            </span>
          </button>
        `;
      }).join("");

      el.stepList.querySelectorAll("[data-step-index]").forEach((button) => {
        button.addEventListener("click", () => {
          state.current = Number(button.dataset.stepIndex);
          state.selectedItem = null;
          state.lastItem = null;
          render();
        });
      });
    }

    function clampNumber(value, min, max) {

    function cashflowReadiness() {
      const monthlyIncome = Math.max(Number(state.calc.monthlyIncome) || 0, 0);
      const essentialSpending = Math.max(Number(state.calc.essentialSpending) || 0, 0);
      const lifestyleSpending = Math.max(Number(state.calc.lifestyleSpending) || 0, 0);
      const totalSpending = essentialSpending + lifestyleSpending;
      const currentMonthlySaving = Math.max(Number(state.calc.currentMonthlySaving) || 0, 0);
      const liquidSavings = Math.max(Number(state.calc.liquidSavings) || 0, 0);
      const monthlySurplus = monthlyIncome - totalSpending;
      const emergencyMonths = totalSpending > 0 ? liquidSavings / totalSpending : 0;
      const spendingRatio = monthlyIncome > 0 ? totalSpending / monthlyIncome : 0;
      const savingsRate = monthlyIncome > 0 ? currentMonthlySaving / monthlyIncome : 0;
      const spendingStatus = monthlyIncome <= 0 || monthlySurplus < 0 || spendingRatio > 0.9
        ? { tone: "red", label: "Needs attention", note: "Spending is high versus income." }
        : spendingRatio > 0.8
          ? { tone: "amber", label: "Watch", note: "Spending is manageable but tight." }
          : { tone: "green", label: "Healthy", note: "Spending is within the 50/30/20 baseline." };
      const savingStatus = savingsRate >= 0.2
        ? { tone: "green", label: "Healthy", note: "Current saving rate is strong." }
        : savingsRate >= 0.1
          ? { tone: "amber", label: "Watch", note: "Savings habit exists, but may need stepping up." }
          : { tone: "red", label: "Needs attention", note: "Saving rate is low versus income." };
      const emergencyStatus = emergencyMonths >= 3
        ? { tone: "green", label: "Healthy", note: "Emergency buffer is at least three months." }
        : emergencyMonths >= 1
          ? { tone: "amber", label: "Watch", note: "Emergency buffer exists but is thin." }
          : { tone: "red", label: "Needs attention", note: "Emergency buffer is below one month." };
      return {
        monthlyIncome,
        essentialSpending,
        lifestyleSpending,
        totalSpending,
        currentMonthlySaving,
        liquidSavings,
        monthlySurplus,
        emergencyMonths,
        spendingRatio,
        savingsRate,
        cards: [
          {
            title: "Monthly surplus",
            value: `${formatCurrency(monthlySurplus)}/mth`,
            status: spendingStatus,
            formula: "Formula: monthly income - monthly spending",
            rating: {
              label: "Spending ratio",
              columns: "80fr 10fr 10fr",
              markerPct: clampNumber(spendingRatio * 100, 0, 100),
              summary: "Baseline healthy <=80%; Watch 80%-90%; Attention >90%",
              segments: [
                { className: "healthy", label: "Healthy <=80%" },
                { className: "watch", label: "Watch 80%-90%" },
                { className: "attention", label: "Attention >90%" }
              ]
            }
          },
          {
            title: "Savings rate",
            value: `${Math.round(savingsRate * 100)}%`,
            status: savingStatus,
            formula: "Formula: current monthly saving / monthly income",
            rating: {
              label: "Saving rate",
              columns: "25fr 25fr 50fr",
              markerPct: clampNumber((savingsRate / 0.4) * 100, 0, 100),
              summary: "Attention <10%; Watch 10%-19%; Healthy >=20%",
              segments: [
                { className: "attention", label: "Attention <10%" },
                { className: "watch", label: "Watch 10%-19%" },
                { className: "healthy", label: "Healthy >=20%" }
              ]
            }
          },
          {
            title: "Emergency buffer",
            value: `${emergencyMonths.toFixed(1)} months`,
            status: emergencyStatus,
            formula: "Formula: liquid savings / monthly spending",
            rating: {
              label: "Emergency months",
              columns: "1fr 2fr 3fr",
              markerPct: clampNumber((emergencyMonths / 6) * 100, 0, 100),
              summary: "Attention <1m; Watch 1-3m; Healthy >=3m",
              segments: [
                { className: "attention", label: "Attention <1m" },
                { className: "watch", label: "Watch 1-3m" },
                { className: "healthy", label: "Healthy >=3m" }
              ]
            }
          }
        ]
      };
    }

    function agePercent(age, minAge, maxAge) {
      const low = Number(minAge) || 0;
      const high = Math.max(Number(maxAge) || low + 1, low + 1);
      const currentAge = Math.min(Math.max(Number(age) || low, low), high);
      return 5 + ((currentAge - low) / (high - low)) * 90;
    }

      return `

    function renderTimeline() {
      const has = (target) => Boolean(getPlacedItemAt(target));
      const values = calcValues();
      const showLine = ["timelineOnly", "eventList", "selectedAges", "houseDetail", "marriedDetail", "kidsDetail", "trinity", "educationDetail", "retirementDetail", "carDetail"].some(has);
      const showInputs = ["eventList", "selectedAges", "houseDetail", "marriedDetail", "kidsDetail", "trinity", "educationDetail", "retirementDetail", "carDetail"].some(has);
      const showAges = ["selectedAges", "houseDetail", "marriedDetail", "kidsDetail", "trinity", "educationDetail", "retirementDetail", "carDetail"].some(has);
      const showDetails = ["houseDetail", "marriedDetail", "kidsDetail", "trinity", "educationDetail", "retirementDetail", "carDetail"].some(has);
      const eduCount = [state.calc.educationAge, state.calc.educationAge2, state.calc.educationAge3].filter((age) => Number(age) > 0).length;
      const events = [
        { key: "house", age: Number(state.calc.houseAge) || 0, label: "House", tone: "", order: 1 },
        { key: "married", age: Number(state.calc.marriedAge) || 0, label: "Get married", tone: "amber", order: 2 },
        { key: "kids", age: Number(state.calc.kidsAge) || 0, label: "Kids", tone: "amber", order: 3 },
        { key: "education", age: Number(state.calc.educationAge) || 0, label: eduCount > 1 ? "Kid 1 education" : "Kids education", tone: "", order: 4 },
        { key: "education2", age: Number(state.calc.educationAge2) || 0, label: "Kid 2 education", tone: "", order: 4.1 },
        { key: "education3", age: Number(state.calc.educationAge3) || 0, label: "Kid 3 education", tone: "", order: 4.2 },
        { key: "retirement", age: Number(values.retirementAge) || 0, label: "Retirement", tone: "green", order: 5 },
        { key: "car", age: Number(state.calc.carAge) || 0, label: "Car", tone: "", order: 6 }
      ].filter((event) => event.age > 0).sort((a, b) => a.age - b.age || a.order - b.order);
      const agesForScale = [Number(values.currentAge) || 0, ...events.map((event) => event.age)].filter((age) => age > 0);
      const minAge = Math.min(...agesForScale);
      const maxAge = Math.max(...agesForScale, minAge + 1);
      const markerPct = (age) => 7 + ((Number(age) - minAge) / Math.max(maxAge - minAge, 1)) * 86;
      const positionedEvents = events.map((event) => ({ ...event, pos: markerPct(event.age) }));
      for (let index = 1; index < positionedEvents.length; index += 1) {
        positionedEvents[index].pos = Math.max(positionedEvents[index].pos, positionedEvents[index - 1].pos + 10.5);
      }
      if (positionedEvents.length) {
        const overflow = Math.max(positionedEvents[positionedEvents.length - 1].pos - 92, 0);
        if (overflow) positionedEvents.forEach((event) => { event.pos -= overflow; });
        for (let index = positionedEvents.length - 2; index >= 0; index -= 1) {
          positionedEvents[index].pos = Math.min(positionedEvents[index].pos, positionedEvents[index + 1].pos - 10.5);
        }
        const underflow = Math.max(7 - positionedEvents[0].pos, 0);
        if (underflow) positionedEvents.forEach((event) => { event.pos += underflow; });
      }
      const trinityEvents = positionedEvents.filter((event) => ["house", "married", "kids"].includes(event.key));
      const trinityLeft = trinityEvents.length ? Math.min(...trinityEvents.map((event) => event.pos)) - 3 : 13;
      const trinityRight = trinityEvents.length ? Math.max(...trinityEvents.map((event) => event.pos)) + 3 : 50;
      const trinityBracketLeft = Math.max(Math.min(trinityLeft, 88), 7);
      const trinityBracketWidth = Math.min(Math.max(trinityRight - trinityLeft, 12), 93 - trinityBracketLeft);
      const currentPos = markerPct(values.currentAge);
      const trinityKeys = ["house", "married", "kids"];
      const trinityApplicable = trinityEvents.length === 3 && trinityEvents.every((event) => event.age >= Number(values.currentAge));
      const trinityActive = has("trinity") && trinityApplicable;
      const eventMarker = (event) => {
        const isTrinityEvent = trinityKeys.includes(event.key);
        const insideTrinitySpan = trinityActive && event.pos >= trinityBracketLeft && event.pos <= trinityBracketLeft + trinityBracketWidth;
        const markerTop = trinityActive && insideTrinitySpan && !isTrinityEvent ? 274 : 174;
        const markerTone = trinityActive && isTrinityEvent ? "amber" : event.tone;
        return `
        <div class="timeline-event ${trinityActive && insideTrinitySpan && !isTrinityEvent ? "below" : ""}" style="left:calc(${event.pos}% - 48px); top:${markerTop}px;">
          <div class="event-pin ${markerTone}">${escapeHtml(event.age)}</div>
          <strong>${translatedHtml(event.label)}</strong>
        </div>
      `;
      };
      const detailCards = [
        has("houseDetail") ? `<article><strong>${translatedHtml("House")}</strong><span>${translatedHtml("Downpayment, CPF OA, renovation.")}</span></article>` : "",
        has("marriedDetail") ? `<article><strong>${translatedHtml("Get married")}</strong><span>${translatedHtml("Proposal, wedding ring, banquet or ceremony, photoshoot, honeymoon, dowry.")}</span></article>` : "",
        has("kidsDetail") ? `<article><strong>${translatedHtml("Kids")}</strong><span>${translatedHtml("Cash for delivery, monthly expenses, confinement, contingency.")}</span></article>` : "",
        has("educationDetail") ? `<article><strong>${translatedHtml("Kids education")}</strong><span>${translatedHtml("University fees 20 years later.")}</span></article>` : "",
        has("retirementDetail") ? `<article><strong>${translatedHtml("Retirement")}</strong><span>${translatedHtml("Have you considered yourself?")}</span></article>` : "",
        has("carDetail") ? `<article><strong>${translatedHtml("Car")}</strong><span>${translatedHtml("Downpayment, road tax, COE, running costs.")}</span></article>` : ""
      ].filter(Boolean).join("");

      return `
        <div class="timeline-board">
          ${showInputs ? `<div class="timeline-controls">
            ${ageInput("currentAge", "Age")}
            ${ageInput("houseAge", "House")}
            ${ageInput("marriedAge", "Married")}
            ${ageInput("kidsAge", "Kids")}
            ${ageInput("educationAge", "Edu 1")}
            ${ageInput("educationAge2", "Edu 2")}
            ${ageInput("educationAge3", "Edu 3")}
            ${ageInput("retirementAge", "Retire")}
            ${ageInput("carAge", "Car")}
          </div>` : ""}
          ${showLine ? `<div class="timeline-line" style="top:255px;"></div>` : ""}
          ${showAges ? `<div class="age-dot" style="left:calc(${currentPos}% - 22px); top:233px;">${escapeHtml(values.currentAge)}</div>` : ""}
          ${showAges ? positionedEvents.map(eventMarker).join("") : ""}
          ${trinityActive ? `
            <div class="trinity-bracket" style="left:${trinityBracketLeft}%; width:${trinityBracketWidth}%;">
              <span>${translatedHtml("Trinity of events (within 5 years)")}</span>
            </div>
          ` : ""}
          ${showDetails ? `
            <div class="timeline-detail-box timeline-detail-final">
              <h3>${translatedHtml("Life events")}</h3>
              <div class="event-breakdown timeline-breakdown">
                ${detailCards}
              </div>
            </div>
          ` : ""}
          <div class="zone-row cols-4" style="bottom:54px;">
            ${zoneHtml("timelineOnly", "story-zone")}
            ${zoneHtml("eventList", "story-zone")}
            ${zoneHtml("selectedAges", "story-zone")}
            ${zoneHtml("houseDetail", "story-zone")}
          </div>
          <div class="zone-row cols-4">
            ${zoneHtml("marriedDetail", "story-zone")}
            ${zoneHtml("kidsDetail", "story-zone")}
            ${zoneHtml("trinity", "story-zone")}
            ${zoneHtml("educationDetail", "story-zone")}
            ${zoneHtml("retirementDetail", "story-zone")}
            ${zoneHtml("carDetail", "story-zone")}
          </div>
        </div>
      `;
    }

    function wireConcernChips() {
      document.querySelectorAll("[data-concern-id]").forEach((button) => {
        button.addEventListener("click", () => {
          const concernId = button.dataset.concernId;
          const selected = new Set(state.report.concerns || []);
          if (selected.has(concernId)) {
            selected.delete(concernId);
          } else {
            selected.add(concernId);
          }
          state.report.concerns = Array.from(selected).filter((id) => concernById(id));
          state.selectedItem = null;
          saveState();
          render();
          if (!el.reportModal.hidden) renderReport();
        });
      });
    }

    function startDrag(event) {
      if (event.button !== 0 && event.pointerType !== "touch") return;
      const card = event.currentTarget;
      const itemId = card.dataset.itemId;
      const ghost = card.cloneNode(true);
      ghost.classList.add("drag-ghost");
      document.body.appendChild(ghost);
      moveGhost(ghost, event.clientX, event.clientY);
      state.selectedItem = itemId;
      state.lastItem = itemId;

      const move = (moveEvent) => {
        moveGhost(ghost, moveEvent.clientX, moveEvent.clientY);
        highlightDrop(moveEvent.clientX, moveEvent.clientY);
      };

      const up = (upEvent) => {
        document.removeEventListener("pointermove", move);
        document.removeEventListener("pointerup", up);
        ghost.remove();
        const target = targetAt(upEvent.clientX, upEvent.clientY);
        clearHighlights();
        if (target) {
          placeItem(itemId, target.dataset.target);
        } else {
          render();
        }
      };

      document.addEventListener("pointermove", move);
      document.addEventListener("pointerup", up);
      event.preventDefault();
    }

    function moveGhost(ghost, x, y) {
      ghost.style.left = `${x}px`;
      ghost.style.top = `${y}px`;
    }

    function targetAt(x, y) {
      const stack = document.elementsFromPoint(x, y);
      return stack.find((node) => node.classList && node.classList.contains("drop-zone"));
    }

    function highlightDrop(x, y) {
      clearHighlights();
      const target = targetAt(x, y);
      if (target) target.classList.add("target-hover");
    }

    function clearHighlights() {
      document.querySelectorAll(".drop-zone.target-hover").forEach((zone) => zone.classList.remove("target-hover"));
    }

    function placeItem(itemId, target) {
      const currentStep = step();
      const item = getItem(itemId, currentStep);
      if (!item) return;

      if (item.target !== target) {
        const zone = document.querySelector(`.drop-zone[data-target="${CSS.escape(target)}"]`);
        if (zone) {
          zone.classList.add("invalid");
          window.setTimeout(() => zone.classList.remove("invalid"), 260);
        }
        return;
      }

      const currentPlaced = placedFor(currentStep);
      Object.keys(currentPlaced).forEach((key) => {
        if (currentPlaced[key] === itemId) delete currentPlaced[key];
      });
      currentPlaced[target] = itemId;
      state.selectedItem = null;
      state.lastItem = itemId;
      render();
    }

    function revealNext() {
      const currentStep = step();
      const nextId = nextUnplaced(currentStep);
      if (!nextId) return;
      const item = getItem(nextId, currentStep);
      placedFor(currentStep)[item.target] = item.id;
      state.selectedItem = null;
      state.lastItem = item.id;
      render();
    }

    function backPoint() {
      const currentStep = step();
      const currentPlaced = placedFor(currentStep);
      const lastPlacedId = [...currentStep.reveal].reverse().find((itemId) => Object.values(currentPlaced).includes(itemId));
      if (!lastPlacedId) return;
      const item = getItem(lastPlacedId, currentStep);
      delete currentPlaced[item.target];
      state.selectedItem = null;
      state.lastItem = null;
      render();
    }

    function resetStep() {
      const currentStep = step();
      state.placed[currentStep.id] = {};
      state.selectedItem = null;
      state.lastItem = null;
      render();
    }

    function revealAllCurrentStep() {
      const currentStep = step();
      currentStep.items.forEach((item) => {
        placedFor(currentStep)[item.target] = item.id;
      });
      state.selectedItem = null;
      state.lastItem = currentStep.reveal[currentStep.reveal.length - 1] || null;
      render();
    }

    function resetAll() {
      if (!window.confirm("Reset the full pitch session?")) return;
      Object.assign(state, clone(DEFAULT_STATE));
      try {
        window.localStorage.removeItem(STORAGE_KEY);
      } catch (error) {
        state.present = false;
      }
      render();
    }

    function previousStep() {
      if (state.current > 0) {
        state.current -= 1;
        state.selectedItem = null;
        state.lastItem = null;
        render();
      }
    }

    function nextStep() {
      if (state.current < STEPS.length - 1) {
        state.current += 1;
        state.selectedItem = null;
        state.lastItem = null;
        render();
      }
    }

    function advancePitch() {
      if (nextUnplaced()) {
        revealNext();
      } else {
        nextStep();
      }
    }

    function retreatPitch() {
      if (placedCount() > 0) {
        backPoint();
      } else {
        previousStep();
      }
    }

    function wireCalcInputs() {
      document.querySelectorAll("[data-calc]").forEach((input) => {
        const moveCursorToEnd = () => {
          window.requestAnimationFrame(() => {

              input.setSelectionRange(end, end);
            } catch (error) {
              input.value = input.value;

        };
        input.addEventListener("focus", moveCursorToEnd);
        input.addEventListener("click", moveCursorToEnd);
        input.addEventListener("input", () => {
          const key = input.dataset.calc;
          state.calc[key] = Number(input.value || 0);
          saveState();
        });
        input.addEventListener("change", () => {

        });
      });
    }

    function calcValues() {
      const currentAge = Number(state.calc.currentAge) || 25;
      const retirementAge = Math.max(Number(state.calc.retirementAge) || 65, currentAge + 1);
      const expectancyAge = Math.max(Number(state.calc.expectancyAge) || 86, retirementAge + 1);
      const monthly = Number(state.calc.monthly) || 0;
      const yearsToRetire = Math.max(retirementAge - currentAge, 1);
      const inflation = (Number(state.calc.inflation) || 0) / 100;
      const incomeYears = Math.max(expectancyAge - retirementAge, 1);
      const startBudget = Number(state.calc.startBudget) || 0;
      const futureMonthly = monthly * Math.pow(1 + inflation, yearsToRetire);
      const annualNeed = futureMonthly * 12;
      const targetPool = annualNeed * incomeYears;
      const dividendRatePct = Number(state.calc.dividendRate) || 6;
      const dividendRate = Math.max(dividendRatePct / 100, 0.001);
      const dividendTarget = annualNeed / dividendRate;
      const incomePoolDifference = dividendTarget - targetPool;
      const dividendBreakEvenYears = 1 / dividendRate;
      return {
        currentAge,
        retirementAge,
        expectancyAge,
        monthly,
        yearsToRetire,
        inflation,
        incomeYears,
        startBudget,
        futureMonthly,
        annualNeed,
        targetPool,
        bankMonthly: monthlyContribution(targetPool, 0.0005, yearsToRetire),
        threeMonthly: monthlyContribution(targetPool, 0.03, yearsToRetire),
        sixMonthly: monthlyContribution(targetPool, 0.06, yearsToRetire),
        eightMonthly: monthlyContribution(targetPool, 0.08, yearsToRetire),
        dividendRatePct,
        dividendTarget,
        incomePoolDifference,
        incomePoolIsLower: incomePoolDifference < 0,
        dividendBreakEvenYears,
        secretMonthlyDividend: monthlyContribution(dividendTarget, dividendRate, yearsToRetire),
        secretMonthlyBank: monthlyContribution(dividendTarget, 0.0005, yearsToRetire),
        secretMonthly3: monthlyContribution(dividendTarget, 0.03, yearsToRetire),
        secretMonthly6: monthlyContribution(dividendTarget, 0.06, yearsToRetire),
        secretMonthly8: monthlyContribution(dividendTarget, 0.08, yearsToRetire)
      };
    }

    function incomePoolNote(values) {
      const rateLabel = `${values.dividendRatePct}%`;
      const pool = formatCurrency(values.dividendTarget);
      const consumed = formatCurrency(values.targetPool);
      const difference = formatCurrency(Math.abs(values.incomePoolDifference));
      const breakEvenYears = Math.round(values.dividendBreakEvenYears * 10) / 10;
      if (Math.abs(values.incomePoolDifference) < 1000) {
        return {
          tone: "green",
          title: "Income pool is close to the spend-down amount",
          text: `At ${rateLabel}, the income pool and the money consumed amount are almost the same.`
        };
      }
      if (values.incomePoolIsLower) {
        return {
          tone: "green",
          title: "Income pool is lower than spending the whole pool",
          text: `At ${rateLabel}, the income pool (${pool}) is ${difference} lower than spending ${consumed} over ${values.incomeYears} years. The income period is longer than the ${breakEvenYears}-year break-even point, so the income-pool idea works in your favour.`
        };
      }
      return {
        tone: "amber",
        title: "Income pool is higher in this profile",
        text: `At ${rateLabel}, the income pool (${pool}) is ${difference} higher than spending ${consumed} because the income-pool method preserves capital. Break-even is about ${breakEvenYears} years, while this profile only needs ${values.incomeYears} years of income.`
      };
    }

    function monthlyContribution(target, annualRate, years) {
      const months = Math.max(years * 12, 1);
      const monthlyRate = annualRate / 12;
      if (monthlyRate <= 0) return target / months;
      return target * monthlyRate / (Math.pow(1 + monthlyRate, months) - 1);
    }

    function formatCurrency(value) {
      const amount = Number(value) || 0;
      if (Math.abs(amount) >= 1000000) {
        const roundedMillions = Math.round((amount / 1000000) * 10) / 10;
        const display = Number.isInteger(roundedMillions) ? roundedMillions.toFixed(0) : roundedMillions.toFixed(1);
        return `$${display}M`;
      }
      if (Math.abs(amount) >= 1000) return `$${Math.round(amount / 100) / 10}k`;
      return `$${Math.round(amount).toLocaleString("en-SG")}`;
    }

    function formatFullCurrency(value) {
      const amount = Math.round(Number(value) || 0);
      return `$${amount.toLocaleString("en-SG")}`;
    }

    function reportMoney(value) {
      const full = formatFullCurrency(value);
      const short = formatCurrency(value);
      return full === short ? full : `${full} (${short})`;
    }

    function reportSignedMoney(value) {
      const amount = Number(value) || 0;
      if (Math.abs(amount) < 1) return "$0";
      return `${amount > 0 ? "+" : "-"}${reportMoney(Math.abs(amount))}`;
    }

    function reportTimelineDiagram(values) {
      const eduCount = [state.calc.educationAge, state.calc.educationAge2, state.calc.educationAge3].filter((age) => Number(age) > 0).length;
      const events = [
        { key: "house", label: "House", age: Number(state.calc.houseAge) || 0, className: "", order: 1 },
        { key: "married", label: "Get married", age: Number(state.calc.marriedAge) || 0, className: "amber", order: 2 },
        { key: "kids", label: "Kids", age: Number(state.calc.kidsAge) || 0, className: "amber", order: 3 },
        { key: "education", label: eduCount > 1 ? "Edu kid 1" : "Education", age: Number(state.calc.educationAge) || 0, className: "", order: 4 },
        { key: "education2", label: "Edu kid 2", age: Number(state.calc.educationAge2) || 0, className: "", order: 4.1 },
        { key: "education3", label: "Edu kid 3", age: Number(state.calc.educationAge3) || 0, className: "", order: 4.2 },
        { key: "retirement", label: "Retirement", age: Number(values.retirementAge) || 0, className: "green", order: 5 },
        { key: "car", label: "Car", age: Number(state.calc.carAge) || 0, className: "", order: 6 }
      ].filter((event) => event.age > 0).sort((a, b) => a.age - b.age || a.order - b.order);
      const scaleAges = [Number(values.currentAge) || 0, Number(values.expectancyAge) || 0, ...events.map((event) => event.age)].filter((age) => age > 0);
      const minAge = Math.min(...scaleAges);
      const maxAge = Math.max(...scaleAges, minAge + 1);
      const pct = (age) => 6 + ((Number(age) - minAge) / Math.max(maxAge - minAge, 1)) * 88;
      const positionedEvents = events.map((event) => ({ ...event, pos: pct(event.age) }));
      const currentMarkerPos = pct(values.currentAge);
      if (positionedEvents.length) {
        positionedEvents[0].pos = Math.max(positionedEvents[0].pos, currentMarkerPos + 10.5);
      }
      for (let index = 1; index < positionedEvents.length; index += 1) {
        positionedEvents[index].pos = Math.max(positionedEvents[index].pos, positionedEvents[index - 1].pos + 10);
      }
      if (positionedEvents.length) {
        const overflow = Math.max(positionedEvents[positionedEvents.length - 1].pos - 91, 0);
        if (overflow) positionedEvents.forEach((event) => { event.pos -= overflow; });
        for (let index = positionedEvents.length - 2; index >= 0; index -= 1) {
          positionedEvents[index].pos = Math.min(positionedEvents[index].pos, positionedEvents[index + 1].pos - 10);
        }
        const underflow = Math.max(7 - positionedEvents[0].pos, 0);
        if (underflow) positionedEvents.forEach((event) => { event.pos += underflow; });
      }
      const trinityEvents = positionedEvents.filter((event) => ["house", "married", "kids"].includes(event.key));
      const trinityLeft = trinityEvents.length ? Math.min(...trinityEvents.map((event) => event.pos)) - 3 : 12;
      const trinityRight = trinityEvents.length ? Math.max(...trinityEvents.map((event) => event.pos)) + 3 : 42;
      const trinityBandLeft = Math.max(Math.min(trinityLeft, 86), 7);
      const trinityBandWidth = Math.min(Math.max(trinityRight - trinityLeft, 10), 92 - trinityBandLeft);
      const trinityKeys = ["house", "married", "kids"];
      const trinityBandRight = trinityBandLeft + trinityBandWidth;
      const trinityApplicable = trinityEvents.length === 3 && trinityEvents.every((event) => event.age >= Number(values.currentAge));
      const eventRows = [];
      const reportEvents = positionedEvents.map((event) => {
        const isTrinityEvent = trinityApplicable && trinityKeys.includes(event.key);
        const insideTrinitySpan = trinityApplicable && event.pos >= trinityBandLeft && event.pos <= trinityBandRight;
        const row = eventRows.length && event.pos - eventRows[eventRows.length - 1].pos < 11
          ? (eventRows[eventRows.length - 1].row === 1 ? 2 : 1)
          : 1;
        eventRows.push({ pos: event.pos, row });
        return {
          ...event,
          className: `${isTrinityEvent ? "amber" : event.className} ${insideTrinitySpan && !isTrinityEvent ? "below" : `row-${row}`}`.trim()
        };
      });
      const markers = [
        { label: "Age", age: values.currentAge, className: "current line", pos: currentMarkerPos },
        ...reportEvents,
        { label: "Expectancy", age: values.expectancyAge, className: "expectancy line", pos: pct(values.expectancyAge) }
      ];
      return `
        <div class="report-timeline-diagram">
          <div class="report-timeline-track"></div>
          ${trinityApplicable ? `
          <div class="report-trinity-band" style="left:${trinityBandLeft}%; width:${trinityBandWidth}%;">
            <span>${translatedHtml("Trinity of events")}</span>
          </div>
          ` : ""}
          ${markers.map((marker) => `
            <div class="report-timeline-marker ${escapeHtml(marker.className)}" style="left:${marker.pos}%;">
              <div class="dot">${escapeHtml(marker.age)}</div>
              <strong>${reportTimelineLabel(marker.label)}</strong>
            </div>
          `).join("")}
        </div>
      `;
    }

    function syncReportControls() {
      el.reportProspectInput.value = state.report.prospectName;
      el.reportDateInput.value = state.report.meetingDate;
      el.reportNotesInput.value = state.report.notes;
      el.reportSectionInputs.forEach((input) => {
        input.checked = reportSectionEnabled(input.dataset.reportSection);
      });
    }

    function renderReport() {
      withReportLanguageOutput(() => {
        el.reportTitle.innerHTML = translatedHtml("Retirement Profile Report");
        el.reportSubtitle.innerHTML = translatedHtml("Generated from the retirement profile inputs");
        el.copyReportBtn.textContent = translatedText("Copy summary");
        el.printReportBtn.textContent = translatedText("Print / Save PDF");
        el.closeReportBtn.textContent = translatedText("Close");
        el.reportProspectInput.placeholder = translatedText("Name");
        el.reportNotesInput.placeholder = translatedText("Optional follow-up notes");
        el.reportModal.querySelectorAll("[data-i18n]").forEach((node) => {
          node.innerHTML = translatedHtml(node.dataset.i18n);
        });
        el.profileReport.innerHTML = reportHtml();
      });
    }

    function openReport() {
      if (!state.report.meetingDate) state.report.meetingDate = todayInputValue();
      syncReportControls();
      renderReport();
      saveState();
      el.reportModal.hidden = false;
      el.reportProspectInput.focus();
    }

    function closeReport() {
      el.reportModal.hidden = true;
    }

    async function copyReportSummary() {
      const text = withReportLanguageOutput(reportText);
      try {
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(text);
        } else {
          throw new Error("Clipboard unavailable");
        }
      } catch (error) {
        const fallback = document.createElement("textarea");
        fallback.value = text;
        fallback.setAttribute("readonly", "");
        fallback.style.position = "fixed";
        fallback.style.left = "-9999px";
        document.body.appendChild(fallback);
        fallback.select();
        document.execCommand("copy");
        fallback.remove();
      }
      const original = el.copyReportBtn.textContent;
      el.copyReportBtn.textContent = translatedText("Copied");
      window.setTimeout(() => {
        el.copyReportBtn.textContent = original;
      }, 1200);
    }

    function isInteractiveTarget(target) {
      if (!target || !target.closest) return false;
      return Boolean(target.closest("input, textarea, select, button, [role='button']") || target.isContentEditable);
    }

    el.prevBtn.addEventListener("click", previousStep);
    el.languageBtn.addEventListener("click", () => {
      state.language = isBilingual() ? "english" : "bilingual";
      saveState();
      render();
      if (!el.reportModal.hidden) renderReport();
    });
    el.nextBtn.addEventListener("click", nextStep);
    el.revealBtn.addEventListener("click", revealNext);
    el.revealAllBtn.addEventListener("click", revealAllCurrentStep);
    el.backBtn.addEventListener("click", backPoint);
    el.resetBtn.addEventListener("click", resetStep);
    el.resetAllBtn.addEventListener("click", resetAll);
    el.presentBtn.addEventListener("click", () => {
      state.present = !state.present;
      render();
    });
    el.reportBtn.addEventListener("click", openReport);
    el.closeReportBtn.addEventListener("click", closeReport);
    el.printReportBtn.addEventListener("click", () => {
      renderReport();
      window.print();
    });
    el.copyReportBtn.addEventListener("click", copyReportSummary);
    el.reportModal.addEventListener("click", (event) => {
      if (event.target === el.reportModal) closeReport();
    });
    el.reportProspectInput.addEventListener("input", () => {
      state.report.prospectName = el.reportProspectInput.value;
      saveState();
      renderReport();
    });
    el.reportDateInput.addEventListener("change", () => {
      state.report.meetingDate = el.reportDateInput.value;
      saveState();
      renderReport();
    });
    el.reportNotesInput.addEventListener("input", () => {
      state.report.notes = el.reportNotesInput.value;
      saveState();
      renderReport();
    });
    el.reportSectionInputs.forEach((input) => {
      input.addEventListener("change", () => {
        state.report.sections[input.dataset.reportSection] = input.checked;
        saveState();
        renderReport();
      });
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !el.reportModal.hidden) {
        closeReport();
        return;
      }
      if (isInteractiveTarget(event.target)) return;
      if (event.key === "ArrowRight" || event.key === " " || event.key === "Enter") {
        event.preventDefault();
        advancePitch();
      }
      if (event.key === "ArrowLeft") {
        event.preventDefault();
        retreatPitch();
      }
      if (event.key.toLowerCase() === "r") el.revealBtn.click();
      if (event.key === "Escape") {
        state.selectedItem = null;
        render();
      }
    });

    render();
  </script>
</body>
</html>
