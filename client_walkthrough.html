const chat = document.getElementById('chat');
const narrator = document.getElementById('narrator');
const progress = document.getElementById('progress');
const inputField = document.getElementById('inputField');
const replayBtn = document.getElementById('replayBtn');

const totalScenes = 13;

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function scrollDown() {
  chat.scrollTop = chat.scrollHeight;
}

function setProgress(scene) {
  progress.style.width = ((scene / totalScenes) * 100) + '%';
}

function showNarrator(text, duration = 2500) {
  narrator.textContent = text;
  narrator.classList.add('show');
  return sleep(duration).then(() => narrator.classList.remove('show'));
}

function addMsg(type, html, delay = 0) {
  return sleep(delay).then(() => {
    const div = document.createElement('div');
    div.className = 'msg ' + type;
    div.innerHTML = html;
    chat.appendChild(div);
    scrollDown();
    setTimeout(scrollDown, 300);
    return sleep(100);
  });
}

function addLabel(text, delay = 0) {
  return sleep(delay).then(() => {
    const div = document.createElement('div');
    div.className = 'scene-label';
    div.innerHTML = '<span>' + text + '</span>';
    chat.appendChild(div);
    scrollDown();
  });
}

function showTyping(duration = 1200) {
  const div = document.createElement('div');
  div.className = 'msg bot typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(div);
  scrollDown();
  return sleep(duration).then(() => {
    div.remove();
  });
}

function typeInput(text, duration = 600) {
  inputField.value = '';
  let i = 0;
  const step = duration / text.length;
  return new Promise(resolve => {
    const interval = setInterval(() => {
      inputField.value = text.substring(0, ++i);
      if (i >= text.length) { clearInterval(interval); setTimeout(() => { inputField.value = ''; resolve(); }, 300); }
    }, step);
  });
}

    '<span class="cmd">/learn</span> — Financial education<br>' +
    '<span class="cmd">/help</span> — Full command list'
  );

  await sleep(500);
  scrollDown();
  await sleep(2000);
  await showNarrator('93 funds. 16 commands. All from Telegram.', 3000);
  await sleep(1000);
  replayBtn.style.display = 'block';
}

async function runWalkthrough() {
  chat.innerHTML = '';
  replayBtn.style.display = 'none';
  setProgress(0);

  await sleep(800);
  await scene0_intro();
  await scene1_overview();
  await scene2_performance();
  await scene3_recommend();
  await scene4_top5();
  await scene5_yield();
  await scene6_compare();
  await scene7_news();
  await scene8_sector();
  await scene9_house();
  await scene10_ask();
  await scene11_learn();
  await scene12_dividend();
  await finale();
}

function replay() {
  runWalkthrough();
}

runWalkthrough();
</script>
