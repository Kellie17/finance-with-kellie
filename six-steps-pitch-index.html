<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>10-Step Investment Pitch Builder</title>
  <style>
    :root {
      --navy: #1d3d68;
      --ink: #172334;
      --muted: #627086;
      --line: #d4deea;
      --soft: #f4f7fa;
      --panel: #ffffff;
      --red: #cf142b;
      --red-soft: #fff0f1;
      --green: #1f7a5c;
      --green-soft: #edf8f3;
      --amber: #b7791f;
      --amber-soft: #fff7e6;
      --blue-soft: #eef5fc;
      --shadow: 0 16px 40px rgba(23, 35, 52, 0.10);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(244, 247, 250, 0.98), rgba(237, 243, 248, 0.94)),
        #f4f7fa;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:focus-visible,
    input:focus-visible,
    .item-card:focus-visible,
    .drop-zone:focus-visible {
      outline: 3px solid rgba(31, 122, 92, 0.35);
      outline-offset: 2px;
    }

    .app-header {
      min-height: 76px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(18px);
      position: sticky;
      top: 0;
      z-index: 30;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand img {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #ffffff;
      box-shadow: 0 8px 22px rgba(29, 61, 104, 0.18);
      flex: 0 0 auto;
    }

    .brand small,
    .panel-label {
      display: block;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .brand h1 {
      margin: 1px 0 0;
      color: var(--navy);
      font-size: clamp(1.08rem, 1.6vw, 1.45rem);
      line-height: 1.1;
      letter-spacing: 0;
      white-space: normal;
    }

    .header-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .progress-pill {
      color: var(--navy);
      background: var(--blue-soft);
      border: 1px solid #c9d9ea;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.9rem;
      font-weight: 750;
      white-space: nowrap;
    }

    .control-button {
      min-height: 38px;
      border: 1px solid var(--line);
      color: var(--ink);
      background: #ffffff;
      border-radius: var(--radius);
      padding: 8px 12px;
      font-weight: 750;
      transition: transform 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
    }

    .control-button:hover {
      border-color: #9fb3ca;
      box-shadow: 0 8px 18px rgba(23, 35, 52, 0.08);
      transform: translateY(-1px);
    }

    .control-button.primary {
      color: #ffffff;
      background: var(--red);
      border-color: var(--red);
    }

    .control-button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
      box-shadow: none;
      transform: none;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 220px minmax(480px, 1fr) 340px;
      gap: 16px;
      padding: 16px;
      min-height: calc(100vh - 76px);
    }

    .step-rail,
    .stage-shell,
    .notes-panel {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .step-rail {
      padding: 12px;
      align-self: start;
      position: sticky;
      top: 92px;
    }

    .step-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .step-button {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      width: 100%;
      min-height: 54px;
      text-align: left;
      border: 1px solid transparent;
      background: transparent;
      border-radius: var(--radius);
      padding: 8px;
      color: var(--ink);
    }

    .step-button:hover {
      background: var(--soft);
    }

    .step-button.active {
      background: var(--blue-soft);
      border-color: #b9cde3;
    }

    .step-number {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #ffffff;
      background: var(--navy);
      font-weight: 850;
    }

    .step-button.done .step-number {
      background: var(--green);
    }

    .step-text {
      min-width: 0;
    }

    .step-text strong {
      display: block;
      font-size: 0.88rem;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .step-text span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.78rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stage-shell {
      min-width: 0;
      overflow: hidden;
    }

    .stage-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 20px 12px;
      border-bottom: 1px solid var(--line);
    }

    .stage-title {
      min-width: 0;
    }

    .stage-title h2 {
      margin: 2px 0 5px;
      color: var(--navy);
      font-size: clamp(1.18rem, 2vw, 1.65rem);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .stage-title p {
      margin: 0;
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.35;
    }

    .stage-metrics {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .metric-chip {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
      color: var(--navy);
      background: #ffffff;
      font-size: 0.85rem;
      font-weight: 750;
      white-space: nowrap;
    }

    .canvas-wrap {
      padding: 18px 20px 20px;
      overflow: auto;
    }

    .canvas {
      position: relative;
      min-height: 700px;
      border: 1px solid #d6e0eb;
      border-radius: var(--radius);
      background:
        linear-gradient(90deg, rgba(31, 122, 92, 0.04) 1px, transparent 1px),
        linear-gradient(180deg, rgba(29, 61, 104, 0.05) 1px, transparent 1px),
        #ffffff;
      background-size: 44px 44px;
      overflow: hidden;
    }

    .diagram-title {
      position: absolute;
      top: 18px;
      left: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--navy);
      font-weight: 850;
      font-size: 1rem;
      z-index: 3;
    }

    .diagram-title .bubble {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #ffffff;
      background: var(--navy);
      font-weight: 900;
    }

    .drop-zone {
      position: absolute;
      min-width: 104px;
      min-height: 52px;
      border: 1.5px dashed #9fb3ca;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.72);
      transition: border-color 140ms ease, background 140ms ease, transform 140ms ease, box-shadow 140ms ease;
      z-index: 5;
    }

    .drop-zone:hover,
    .drop-zone.target-hover {
      border-color: var(--green);
      background: #ffffff;
      box-shadow: 0 10px 22px rgba(23, 35, 52, 0.10);
      transform: translateY(-1px);
    }

    .drop-zone.invalid {
      border-color: var(--red);
      background: var(--red-soft);
      animation: shake 220ms ease;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      35% { transform: translateX(-5px); }
      70% { transform: translateX(5px); }
      100% { transform: translateX(0); }
    }

    .placed-card {
      width: 100%;
      height: 100%;
      min-height: inherit;
      display: grid;
      align-content: center;
      gap: 4px;
      padding: 10px 12px;
      border-radius: calc(var(--radius) - 1px);
      border: 1.5px solid var(--navy);
      background: var(--blue-soft);
      color: var(--ink);
      overflow: hidden;
    }

    .placed-card.red {
      border-color: var(--red);
      background: var(--red-soft);
    }

    .placed-card.green {
      border-color: var(--green);
      background: var(--green-soft);
    }

    .placed-card.amber {
      border-color: var(--amber);
      background: var(--amber-soft);
    }

    .placed-card strong {
      display: block;
      color: inherit;
      font-size: clamp(0.82rem, 1.2vw, 1rem);
      line-height: 1.08;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .placed-card span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.16;
      overflow-wrap: anywhere;
    }

    .placed-card b {
      color: inherit;
      font-weight: 850;
    }

    .notes-panel {
      align-self: start;
      position: sticky;
      top: 92px;
      max-height: calc(100vh - 108px);
      display: grid;
      grid-template-rows: auto minmax(180px, 1fr) auto;
      overflow: hidden;
    }

    .note-block,
    .bank-block,
    .status-block {
      padding: 16px;
    }

    .note-block {
      border-bottom: 1px solid var(--line);
      overflow: auto;
    }

    .note-block h3,
    .bank-block h3 {
      margin: 3px 0 10px;
      color: var(--navy);
      font-size: 1.05rem;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .cue-list {
      margin: 0;
      padding-left: 18px;
      color: var(--ink);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .cue-list li + li {
      margin-top: 7px;
    }

    .active-note {
      margin-top: 14px;
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid #cbd8e6;
      background: var(--soft);
    }

    .active-note strong {
      display: block;
      color: var(--navy);
      font-size: 0.92rem;
      line-height: 1.2;
      letter-spacing: 0;
      margin-bottom: 5px;
    }

    .active-note p {
      margin: 0;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.4;
    }

    .bank-block {
      overflow: auto;
      min-height: 0;
    }

    .item-grid {
      display: grid;
      gap: 9px;
    }

    .item-card {
      width: 100%;
      display: grid;
      gap: 4px;
      text-align: left;
      border: 1px solid #cbd8e6;
      border-left: 5px solid var(--navy);
      border-radius: var(--radius);
      background: #ffffff;
      padding: 10px 11px;
      color: var(--ink);
      user-select: none;
      touch-action: none;
      transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
    }

    .item-card:hover,
    .item-card.selected {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(23, 35, 52, 0.10);
      border-color: #9fb3ca;
    }

    .item-card.red {
      border-left-color: var(--red);
    }

    .item-card.green {
      border-left-color: var(--green);
    }

    .item-card.amber {
      border-left-color: var(--amber);
    }

    .item-card strong {
      color: var(--ink);
      font-size: 0.92rem;
      line-height: 1.15;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .item-card span {
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .item-card .range {
      color: var(--navy);
      font-weight: 780;
    }

    .empty-bank {
      border: 1px dashed #b9c7d6;
      border-radius: var(--radius);
      padding: 14px;
      color: var(--green);
      background: var(--green-soft);
      font-weight: 780;
      font-size: 0.9rem;
      text-align: center;
    }

    .status-block {
      border-top: 1px solid var(--line);
      background: var(--soft);
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.3;
    }

    .bar {
      height: 8px;
      border-radius: 999px;
      background: #d9e3ee;
      overflow: hidden;
      margin-top: 10px;
    }

    .bar span {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--green), var(--navy));
      transition: width 180ms ease;
    }

    .drag-ghost {
      position: fixed;
      z-index: 1000;
      pointer-events: none;
      width: min(270px, 72vw);
      opacity: 0.96;
      transform: translate(-50%, -50%);
      box-shadow: 0 18px 46px rgba(23, 35, 52, 0.22);
    }

    .axis-label {
      position: absolute;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      z-index: 2;
    }

    .asset-board {
      position: absolute;
      inset: 66px 34px 34px;
    }

    .asset-axis {
      position: absolute;
      left: 12px;
      top: 42px;
      bottom: 42px;
      width: 1.5px;
      background: #718096;
    }

    .asset-axis:before,
    .asset-axis:after {
      content: "";
      position: absolute;
      left: -4px;
      width: 9px;
      height: 9px;
      border-left: 1.5px solid #718096;
      border-top: 1.5px solid #718096;
    }

    .asset-axis:before {
      top: -1px;
      transform: rotate(45deg);
    }

    .asset-axis:after {
      bottom: -1px;
      transform: rotate(225deg);
    }

    .asset-inflation {
      position: absolute;
      left: 86px;
      right: 36px;
      top: 49.5%;
      border-top: 2px dashed var(--red);
      z-index: 1;
      opacity: 0;
      transition: opacity 180ms ease;
    }

    .asset-inflation.visible {
      opacity: 1;
    }

    .asset-inflation span {
      position: absolute;
      top: -28px;
      left: 0;
      color: var(--red);
      font-size: 0.82rem;
      font-weight: 800;
      background: #ffffff;
      padding-right: 8px;
    }

    .asset-inflation-zone {
      position: absolute;
      left: 84px;
      right: 116px;
      top: 46.5%;
      min-height: 38px;
      z-index: 5;
      opacity: 0;
      pointer-events: none;
    }

    .asset-inflation-zone .placed-card {
      display: none;
    }

    .asset-range-head {
      position: absolute;
      right: 0;
      top: 8px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .asset-slot {
      left: 84px;
      right: 116px;
      min-height: 38px;
    }

    .asset-slot .placed-card {
      min-height: 38px;
      grid-template-columns: 190px minmax(120px, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding-top: 6px;
      padding-bottom: 6px;
    }

    .asset-slot .placed-card .range {
      display: grid;
    }

    .asset-range {
      position: absolute;
      right: 12px;
      width: 92px;
      color: var(--navy);
      font-size: 0.86rem;
      font-weight: 850;
      line-height: 38px;
      z-index: 2;
    }

    .asset-range.red {
      color: var(--red);
    }

    .asset-range.green {
      color: var(--green);
    }

    .asset-range.amber {
      color: var(--amber);
    }

    .focus-zone {
      position: absolute;
      left: 70px;
      right: 104px;
      top: 19%;
      height: 26.2%;
      border: 2px solid rgba(31, 122, 92, 0.7);
      border-radius: var(--radius);
      background: rgba(31, 122, 92, 0.05);
      z-index: 0;
      opacity: 0;
      transition: opacity 180ms ease;
    }

    .focus-zone.visible {
      opacity: 1;
    }

    .focus-zone span {
      position: absolute;
      right: 10px;
      bottom: -17px;
      color: var(--green);
      font-size: 0.8rem;
      font-weight: 850;
      background: #ffffff;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(31, 122, 92, 0.25);
      z-index: 4;
    }

    .var-reveal-return {
      animation: stagedReveal 180ms ease both;
    }

    .var-reveal-risk {
      animation: stagedReveal 180ms ease 180ms both;
    }

    .var-reveal-time {
      animation: stagedReveal 180ms ease 360ms both;
    }

    .var-reveal-shortcut {
      animation: stagedReveal 180ms ease 540ms both;
    }

    .var-step-circle {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      animation: varCirclePop 520ms ease forwards;
    }

    .var-circle-return {
      animation-delay: 120ms;
    }

    .var-circle-risk {
      animation-delay: 720ms;
    }

    .var-circle-time {
      animation-delay: 1320ms;
    }

    @keyframes varCirclePop {
      from {
        opacity: 0;
        transform: scale(0.68);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes stagedReveal {
      from {
        opacity: 0;
        transform: scale(0.94);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .svg-board {
      position: absolute;
      inset: 76px 24px 24px;
    }

    .svg-board svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .graph-zone {
      min-width: 132px;
      min-height: 58px;
    }

    .story-zone {
      min-width: 76px;
      min-height: 48px;
    }

    .story-zone .placed-card {
      padding: 6px 7px;
      gap: 2px;
    }

    .story-zone .placed-card strong {
      font-size: 0.7rem;
      line-height: 1.05;
    }

    .story-zone .placed-card span,
    .story-zone .placed-card .range {
      display: none;
    }

    .dca-board,
    .variables-board,
    .downtrend-board,
    .funds-board {
      position: absolute;
      inset: 78px 34px 34px;
    }

    .equation-board,
    .timeline-board,
    .retire-board,
    .retirement-board,
    .lifestyle-board,
    .math-board,
    .methods-board,
    .secret-board {
      position: absolute;
      inset: 78px 34px 34px;
    }

    .dca-board svg,
    .variables-board svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .downtrend-board {
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
      color: var(--navy);
    }

    .downtrend-hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px;
      gap: 18px;
      align-items: stretch;
    }

    .downtrend-statement {
      border: 2px solid var(--navy);
      border-radius: var(--radius);
      background: #ffffff;
      padding: 18px 20px;
      box-shadow: 0 14px 34px rgba(29, 61, 104, 0.08);
    }

    .downtrend-statement span {
      display: inline-flex;
      margin-bottom: 8px;
      color: var(--red);
      font-size: 0.86rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .downtrend-statement strong {
      display: block;
      font-size: clamp(1.45rem, 2.8vw, 2.15rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .downtrend-chart-card {
      border: 1.5px solid #d2deeb;
      border-radius: var(--radius);
      background: #ffffff;
      padding: 16px;
      display: grid;
      gap: 8px;
      box-shadow: 0 14px 28px rgba(23, 35, 52, 0.07);
    }

    .downtrend-chart-card h3 {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.1;
    }

    .downtrend-chart-card svg {
      width: 100%;
      height: 84px;
      display: block;
    }

    .downtrend-examples {
      position: relative;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      align-items: stretch;
    }

    .downtrend-example-card {
      border: 2px solid var(--navy);
      border-radius: var(--radius);
      background: linear-gradient(180deg, #ffffff, var(--blue-soft));
      padding: 14px;
      min-height: 166px;
      box-shadow: 0 16px 34px rgba(23, 35, 52, 0.08);
    }

    .downtrend-example-card.red {
      border-color: var(--red);
      background: linear-gradient(180deg, #ffffff, var(--red-soft));
    }

    .downtrend-example-card h3 {
      margin: 0 0 12px;
      font-size: clamp(1.05rem, 1.7vw, 1.35rem);
      line-height: 1.1;
      color: var(--navy);
    }

    .downtrend-example-card.red h3 {
      color: var(--red);
    }

    .not-possible-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 8px 0 0;
      padding: 7px 12px;
      border: 2px solid var(--red);
      border-radius: 999px;
      color: var(--red);
      background: #ffffff;
      font-size: 0.78rem;
      font-weight: 950;
      letter-spacing: 0.08em;

      font-size: 0.66rem;
      font-weight: 900;
    }

      .report-card-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .report-card-grid.single {
        grid-template-columns: minmax(0, 1fr);
        gap: 14px;
      }

    .report-card {
      padding: 12px;
      background: #ffffff;
    }

    .report-card h4 {
      margin: 0 0 6px;
      color: var(--navy);
      font-size: 0.96rem;
    }

    .report-card p,
    .report-card li,
    .report-note-box p {
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.38;
    }

    .report-card p {
      margin: 0;
    }

    .report-card ul {
      margin: 0;
      padding-left: 18px;
    }

    .report-card.selected {
      border: 2px solid var(--green);
      background: var(--green-soft);
      box-shadow: 0 8px 20px rgba(31, 122, 92, 0.10);
    }

    .report-card.selected h4 {
      color: var(--green);
    }

    .report-amount-needed {
      margin: 10px 0 8px;
      padding: 12px 14px;
      border: 2px solid var(--green);
      border-radius: var(--radius);
      background: var(--green-soft);
      color: var(--navy);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
    }

    .report-amount-needed span {
      display: block;
      color: var(--green);
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .report-amount-needed p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.25;
    }

    .report-amount-needed strong {
      color: var(--green);
      font-size: 1.35rem;
      font-weight: 950;
      line-height: 1;
      white-space: nowrap;
    }

      .report-table {
        width: 100%;
        margin-top: 10px;
        border-collapse: collapse;
        overflow: hidden;
        border: 1px solid #d7e1ec;
        border-radius: var(--radius);
        background: #ffffff;
    }

    .report-table th,
    .report-table td {
      padding: 9px 10px;
      border-bottom: 1px solid #e5edf5;
      text-align: left;
      vertical-align: top;
      font-size: 0.84rem;
      line-height: 1.3;
    }

    .report-table th {
      color: var(--navy);
      background: var(--blue-soft);
      font-size: 0.74rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .report-table tr:last-child td {
      border-bottom: 0;
    }

    .report-table strong {
      color: var(--navy);
    }

    .report-note-box {
      padding: 12px;
      background: var(--soft);
    }

    .report-note-box p {
      margin: 0;
    }

    .report-note-box.important {
      border-color: rgba(31, 122, 92, 0.28);
      background: var(--green-soft);
    }

    .report-two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .report-formula {
      display: grid;
      gap: 8px;
      padding: 14px;
      border: 2px solid var(--navy);
      border-radius: var(--radius);
      color: var(--navy);
      background: #ffffff;
      text-align: center;
      font-weight: 900;
    }

    .report-formula .circled {
      display: inline-grid;
      place-items: center;
      min-width: 92px;
      min-height: 56px;
      padding: 6px 12px;
      border: 3px solid var(--red);
      border-radius: 50%;
      color: var(--green);
      background: #ffffff;
    }

      .report-secret-snapshot {
        display: grid;
        grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
        gap: 14px;
      }

    .report-secret-snapshot .report-formula {
      min-height: 84px;
      align-content: center;
    }

    .report-secret-snapshot .wide {
      grid-column: 1 / -1;
    }

    .report-secret-rate,
    .report-secret-note {
      border: 1px solid #d7e1ec;
      border-radius: var(--radius);
      background: #ffffff;
      padding: 14px;
    }

    .report-secret-rate h4,
    .report-secret-note h4,
    .report-secret-monthly h4 {
      margin: 0 0 6px;
      color: var(--navy);
      font-size: 0.98rem;
    }

    .report-secret-rate strong {
      display: block;
      color: var(--green);
      font-size: 1.55rem;
      line-height: 1.05;
      font-weight: 950;
    }

    .report-secret-rate p,
    .report-secret-note p,
    .report-secret-monthly p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.3;
      font-weight: 700;
    }

    .report-secret-note {
      grid-column: 1 / -1;
      border-color: rgba(183, 121, 31, 0.32);
      background: var(--amber-soft);
    }

    .report-secret-note.green {
      border-color: rgba(31, 122, 92, 0.30);
      background: var(--green-soft);
    }

    .report-secret-monthly {
      grid-column: 1 / -1;
      border: 2px solid var(--green);
      border-radius: var(--radius);
      background: var(--green-soft);
      padding: 14px;
      text-align: center;
    }

    .report-secret-monthly strong {
      display: block;
      color: var(--green);
      font-size: 1.85rem;
      line-height: 1.05;
      font-weight: 950;
    }

    .report-disclaimer {
      margin-top: 22px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.76rem;
      line-height: 1.35;
    }

    @media print {
      @page {
        size: A4;
        margin: 0;
      }

      body {
        background: #ffffff;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .profile-report a[href]::after {
        content: none !important;
      }

      .app-header,
      .app-shell,
      .report-toolbar,
      .report-controls {
        display: none !important;
      }

      .report-modal {
        position: static;
        inset: auto;
        overflow: visible;
        padding: 0;
        background: #ffffff;
      }

      .report-dialog {
        max-width: none;
        margin: 0;
        border: 0;
        border-radius: 0;
        box-shadow: none;
        overflow: visible;
      }

      .profile-report {
        padding: 13mm 10mm;
        font-size: 0.9rem;
      }

      .report-hero {
        grid-template-columns: minmax(0, 1fr) 235px;
        gap: 10px;
        padding-bottom: 14px;
      }

      .report-mascot {
        width: 46px;
        height: 46px;
      }

      .report-hero h2 {
        font-size: 1.48rem;
        margin: 1px 0 3px;
        line-height: 1;
      }

      .report-hero p,
      .report-card p,
      .report-card li,
      .report-note-box p,
      .report-table th,
      .report-table td {
        font-size: 0.76rem;
        line-height: 1.28;
      }

      .report-brand-lockup {
        gap: 8px;
      }

      .report-hero small,
      .report-meta span,
      .report-kpi span {
        font-size: 0.56rem;
      }

      .report-hero p {
        max-width: 430px;
        font-size: 0.68rem;
        line-height: 1.18;
      }

      .report-meta {
        gap: 4px;
      }

      .report-meta div {
        padding: 5px 7px;
      }

      .report-meta strong {
        margin-top: 1px;
        font-size: 0.72rem;
        line-height: 1.08;
      }

      .report-contact-links {
        gap: 4px;
        margin-top: 4px;
      }

      .report-contact-links a {
        min-height: 20px;
        padding: 3px 7px;
        font-size: 0.56rem;
      }

      .report-section {
        margin-top: 23px;
      }

      .report-timeline-section {
        break-before: auto;
        page-break-before: auto;
      }

      .report-funding-section {
        break-before: auto;
        page-break-before: auto;
        padding-top: 0;
      }

      .report-page-2-start {
        break-before: page;
        page-break-before: always;
        padding-top: 20mm;
      }

      .report-page-3-start {
        break-before: page;
        page-break-before: always;
        padding-top: 12mm;
      }

      .report-section h3 {
        font-size: 0.82rem;
        margin-bottom: 8px;
      }

      .report-kpi-grid,
      .report-card-grid,
      .report-two-col {
        gap: 8px;
      }

      .report-kpi,
      .report-card,
      .report-note-box,
      .report-formula,
      .report-amount-needed {
        padding: 8px;
      }

      .report-kpi-grid {
        gap: 8px;
        margin-top: 14px;
        margin-bottom: 16px;
      }

      .report-kpi {
        min-height: 54px;
      }

      .report-kpi strong {
        margin-top: 1px;
        font-size: 0.88rem;
        line-height: 1.05;
      }

      .report-kpi small {
        font-size: 0.52rem;
        line-height: 1.08;
      }

      .report-table th,
      .report-table td {
        padding: 4px 6px;
        font-size: 0.6rem;
        line-height: 1.12;
      }

      .report-table th {
        font-size: 0.5rem;
      }

      .report-amount-needed {
        margin: 10px 0 10px;
        grid-template-columns: minmax(0, 1fr) auto;
      }

      .report-amount-needed span {
        font-size: 0.52rem;
      }

      .report-amount-needed p {
        font-size: 0.58rem;
      }

      .report-amount-needed strong {
        font-size: 1rem;
      }

      .report-timeline-diagram {
        min-height: 166px;
        margin-bottom: 16px;
        background-size: 28px 28px;
      }

      .report-timeline-track {
        top: 72px;
        border-top-width: 3px;
      }

      .report-timeline-marker {
        top: 20px;
        min-width: 62px;
      }

      .report-timeline-marker.row-1 {
        top: 8px;
      }

      .report-timeline-marker.row-2 {
        top: 38px;
      }

      .report-timeline-marker.below {
        top: 92px;
      }

      .report-timeline-marker.line {
        top: 58px;
        min-width: 34px;
      }

      .report-timeline-marker .dot {
        width: 24px;
        height: 24px;
        margin-bottom: 2px;
        font-size: 0.62rem;
      }

      .report-timeline-marker strong {
        max-width: 62px;
        font-size: 0.46rem;
        line-height: 0.98;
      }

      .report-trinity-band {
        top: 3px;
        height: 22px;
      }

      .report-trinity-band span {
        top: -8px;
        padding: 0 5px;
        font-size: 0.5rem;
      }

      .report-card,
      .report-kpi,
      .report-note-box,
      .report-formula {
        break-inside: avoid;
      }

      .report-secret-snapshot {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 12px;
      }

      .report-funding-section .report-secret-snapshot {
        margin-top: 8px;
      }

      .report-secret-snapshot .report-formula,
      .report-secret-rate,
      .report-secret-note,
      .report-secret-monthly {
        padding: 8px;
        min-height: auto;
      }

      .report-secret-rate strong,
      .report-secret-monthly strong {
        font-size: 1.3rem;
      }

      .report-disclaimer {
        margin-top: 10px;
        padding-top: 6px;
        font-size: 0.56rem;
        line-height: 1.2;
      }
    }

    @media (max-width: 1180px) {
      .app-shell {
        grid-template-columns: 190px minmax(0, 1fr);
      }

      .notes-panel {
        grid-column: 1 / -1;
        position: static;
        max-height: none;
        grid-template-columns: minmax(260px, 1fr) minmax(260px, 1fr);
        grid-template-rows: auto auto;
      }

      .note-block {
        border-bottom: 0;
        border-right: 1px solid var(--line);
      }

      .status-block {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 820px) {
      .app-header {
        position: static;
        align-items: flex-start;
        flex-direction: column;
      }

      .header-actions {
        width: 100%;
        justify-content: flex-start;
      }

      .app-shell {
        grid-template-columns: minmax(0, 1fr);
        padding: 10px;
      }

      .step-rail {
        position: static;
        overflow: auto;
      }

      .step-list {
        display: flex;
        min-width: max-content;
      }

      .step-button {
        width: 190px;
      }

      .stage-head {
        flex-direction: column;
      }

      .stage-metrics {
        justify-content: flex-start;
      }

      .canvas-wrap {
        padding: 12px;
      }

      .canvas {
        min-width: 720px;
      }

      .notes-panel {
        display: block;
      }

      .note-block {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .calc-strip {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }

      .retire-flow {
        top: 232px;
      }

      .report-modal {
        padding: 12px;
      }

      .report-controls,
      .report-hero,
      .report-kpi-grid,
      .report-card-grid,
      .report-two-col {
        grid-template-columns: 1fr;
      }
    }
  </style>

    function step() {
      return STEPS[state.current];
    }

    function placedFor(currentStep = step()) {
      return state.placed[currentStep.id];
    }

    function placedCount(currentStep = step()) {
      return Object.keys(placedFor(currentStep)).length;
    }

    function getItem(itemId, currentStep = step()) {
      return currentStep.items.find((item) => item.id === itemId);
    }

    function getPlacedItemAt(target, currentStep = step()) {
      const itemId = placedFor(currentStep)[target];
      return itemId ? getItem(itemId, currentStep) : null;
    }

    function nextUnplaced(currentStep = step()) {
      return currentStep.reveal.find((itemId) => !Object.values(placedFor(currentStep)).includes(itemId));
    }

    function allStepDone(currentStep) {
      return placedCount(currentStep) === currentStep.items.length;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function toneClass(item) {
      return item?.tone === "red" ? "red" : item?.tone === "green" ? "green" : item?.tone === "amber" ? "amber" : "";
    }

    function cardHtml(item) {
      if (!item) return "";
      const tone = toneClass(item);
      const range = item.range ? `<span class="range">${escapeHtml(item.range)}</span>` : "";
      return `
        <div class="placed-card ${tone}">
          <strong>${escapeHtml(item.label)}</strong>
          <span>${escapeHtml(item.detail)}</span>
          ${range}
        </div>
      `;
    }

    function zoneHtml(target, className, style = "") {
      const item = getPlacedItemAt(target);
      const label = item ? `${item.label}, placed` : `slot ${target}`;
      return `
        <button class="drop-zone ${className}" data-target="${escapeHtml(target)}" aria-label="${escapeHtml(label)}" style="${style}">
          ${cardHtml(item)}
        </button>
      `;
    }

    function render() {
      const currentStep = step();
      const count = placedCount(currentStep);
      const total = currentStep.items.length;
      const nextId = nextUnplaced(currentStep);
      const nextItem = nextId ? getItem(nextId, currentStep) : null;
      const activeItem = state.lastItem && getItem(state.lastItem, currentStep) ? getItem(state.lastItem, currentStep) : nextItem;

      renderStepList();
      el.globalProgress.textContent = `Step ${currentStep.num} of ${STEPS.length}`;
      el.stageKicker.textContent = `Concept ${currentStep.num}`;
      el.stageTitle.textContent = currentStep.title;
      el.stageSub.textContent = currentStep.subtitle;
      el.placedMetric.textContent = `${count} of ${total} placed`;
      el.nextMetric.textContent = nextItem ? `Next: ${nextItem.label}` : "Complete";
      el.prevBtn.disabled = state.current === 0;
      el.backBtn.disabled = count === 0;
      el.nextBtn.disabled = state.current === STEPS.length - 1;
      el.revealBtn.disabled = !nextItem;
      el.presentBtn.textContent = state.present ? "Full view" : "Focus view";
      el.bankTitle.textContent = currentStep.bankTitle;
      el.noteTitle.textContent = currentStep.short;
      el.cueList.innerHTML = currentStep.cues.map((cue) => `<li>${escapeHtml(cue)}</li>`).join("");
      el.activeNote.innerHTML = activeItem
        ? `<strong>${escapeHtml(activeItem.label)}</strong><p>${escapeHtml(activeItem.note)}</p>`
        : `<strong>Step complete</strong><p>Move to the next concept when the client has agreed with the logic.</p>`;
      el.statusText.textContent = `${count} of ${total} pieces placed`;
      el.statusPct.textContent = `${Math.round((count / total) * 100)}%`;
      el.statusBar.style.width = `${(count / total) * 100}%`;
      el.body.classList.toggle("present-mode", state.present);

      renderCanvas(currentStep);
      renderBank(currentStep);
      wireTargets();
      wireDraggables();

    function agePercent(age, minAge, maxAge) {
      const low = Number(minAge) || 0;
      const high = Math.max(Number(maxAge) || low + 1, low + 1);
      const currentAge = Math.min(Math.max(Number(age) || low, low), high);
      return 5 + ((currentAge - low) / (high - low)) * 90;

      const showAges = ["selectedAges", "houseDetail", "marriedDetail", "kidsDetail", "trinity", "educationDetail", "retirementDetail", "carDetail"].some(has);
      const showDetails = ["houseDetail", "marriedDetail", "kidsDetail", "trinity", "educationDetail", "retirementDetail", "carDetail"].some(has);
      const events = [
        { key: "house", age: Number(state.calc.houseAge) || 0, label: "House", tone: "", order: 1 },
        { key: "married", age: Number(state.calc.marriedAge) || 0, label: "Get married", tone: "amber", order: 2 },
        { key: "kids", age: Number(state.calc.kidsAge) || 0, label: "Kids", tone: "amber", order: 3 },
        { key: "education", age: Number(state.calc.educationAge) || 0, label: "Kids education", tone: "", order: 4 },
        { key: "retirement", age: Number(values.retirementAge) || 0, label: "Retirement", tone: "green", order: 5 },
        { key: "car", age: Number(state.calc.carAge) || 0, label: "Car", tone: "", order: 6 }
      ].filter((event) => event.age > 0).sort((a, b) => a.age - b.age || a.order - b.order);
      const agesForScale = [Number(values.currentAge) || 0, ...events.map((event) => event.age)].filter((age) => age > 0);
      const minAge = Math.min(...agesForScale);
      const maxAge = Math.max(...agesForScale, minAge + 1);
      const markerPct = (age) => 7 + ((Number(age) - minAge) / Math.max(maxAge - minAge, 1)) * 86;
      const positionedEvents = events.map((event) => ({ ...event, pos: markerPct(event.age) }));
      for (let index = 1; index < positionedEvents.length; index += 1) {
        positionedEvents[index].pos = Math.max(positionedEvents[index].pos, positionedEvents[index - 1].pos + 10.5);
      }
      if (positionedEvents.length) {
        const overflow = Math.max(positionedEvents[positionedEvents.length - 1].pos - 92, 0);
        if (overflow) positionedEvents.forEach((event) => { event.pos -= overflow; });
        for (let index = positionedEvents.length - 2; index >= 0; index -= 1) {
          positionedEvents[index].pos = Math.min(positionedEvents[index].pos, positionedEvents[index + 1].pos - 10.5);
        }
        const underflow = Math.max(7 - positionedEvents[0].pos, 0);
        if (underflow) positionedEvents.forEach((event) => { event.pos += underflow; });
      }
      const trinityEvents = positionedEvents.filter((event) => ["house", "married", "kids"].includes(event.key));
      const trinityLeft = trinityEvents.length ? Math.min(...trinityEvents.map((event) => event.pos)) - 3 : 13;
      const trinityRight = trinityEvents.length ? Math.max(...trinityEvents.map((event) => event.pos)) + 3 : 50;
      const trinityBracketLeft = Math.max(Math.min(trinityLeft, 88), 7);
      const trinityBracketWidth = Math.min(Math.max(trinityRight - trinityLeft, 12), 93 - trinityBracketLeft);
      const currentPos = markerPct(values.currentAge);
      const trinityKeys = ["house", "married", "kids"];
      const trinityActive = has("trinity");
      const eventMarker = (event) => {
        const isTrinityEvent = trinityKeys.includes(event.key);
        const insideTrinitySpan = trinityActive && event.pos >= trinityBracketLeft && event.pos <= trinityBracketLeft + trinityBracketWidth;
        const markerTop = trinityActive && insideTrinitySpan && !isTrinityEvent ? 274 : 174;
        const markerTone = trinityActive && isTrinityEvent ? "amber" : event.tone;
        return `
        <div class="timeline-event ${trinityActive && insideTrinitySpan && !isTrinityEvent ? "below" : ""}" style="left:calc(${event.pos}% - 48px); top:${markerTop}px;">
          <div class="event-pin ${markerTone}">${escapeHtml(event.age)}</div>

      return `

          ${showInputs ? `<div class="timeline-controls">
            ${ageInput("currentAge", "Age")}
            ${ageInput("houseAge", "House")}
            ${ageInput("marriedAge", "Married")}

          ${showAges ? `<div class="age-dot" style="left:calc(${currentPos}% - 22px); top:233px;">${escapeHtml(values.currentAge)}</div>` : ""}
          ${showAges ? positionedEvents.map(eventMarker).join("") : ""}

              <span>Trinity of events (within 5 years)</span>
            </div>

          ${showDetails ? `

          <div class="zone-row cols-4" style="bottom:54px;">

    function wireTargets() {
      document.querySelectorAll(".drop-zone").forEach((zone) => {
        zone.addEventListener("click", () => {
          if (state.selectedItem) {
            placeItem(state.selectedItem, zone.dataset.target);
          }
        });
      });
    }

    function wireDraggables() {
      document.querySelectorAll(".item-card").forEach((card) => {
        card.addEventListener("click", () => {
          state.selectedItem = card.dataset.itemId;
          state.lastItem = card.dataset.itemId;
          render();
        });
        card.addEventListener("pointerdown", startDrag);
      });
    }

    function startDrag(event) {
      if (event.button !== 0 && event.pointerType !== "touch") return;
      const card = event.currentTarget;
      const itemId = card.dataset.itemId;
      const ghost = card.cloneNode(true);
      ghost.classList.add("drag-ghost");
      document.body.appendChild(ghost);
      moveGhost(ghost, event.clientX, event.clientY);
      state.selectedItem = itemId;
      state.lastItem = itemId;

      const move = (moveEvent) => {
        moveGhost(ghost, moveEvent.clientX, moveEvent.clientY);
        highlightDrop(moveEvent.clientX, moveEvent.clientY);
      };

      const up = (upEvent) => {
        document.removeEventListener("pointermove", move);
        document.removeEventListener("pointerup", up);
        ghost.remove();
        const target = targetAt(upEvent.clientX, upEvent.clientY);
        clearHighlights();
        if (target) {
          placeItem(itemId, target.dataset.target);
        } else {
          render();
        }
      };

      document.addEventListener("pointermove", move);
      document.addEventListener("pointerup", up);
      event.preventDefault();
    }

    function moveGhost(ghost, x, y) {
      ghost.style.left = `${x}px`;
      ghost.style.top = `${y}px`;
    }

    function targetAt(x, y) {
      const stack = document.elementsFromPoint(x, y);
      return stack.find((node) => node.classList && node.classList.contains("drop-zone"));
    }

    function highlightDrop(x, y) {
      clearHighlights();
      const target = targetAt(x, y);
      if (target) target.classList.add("target-hover");
    }

    function clearHighlights() {
      document.querySelectorAll(".drop-zone.target-hover").forEach((zone) => zone.classList.remove("target-hover"));
    }

    function placeItem(itemId, target) {
      const currentStep = step();
      const item = getItem(itemId, currentStep);
      if (!item) return;

      if (item.target !== target) {
        const zone = document.querySelector(`.drop-zone[data-target="${CSS.escape(target)}"]`);
        if (zone) {
          zone.classList.add("invalid");
          window.setTimeout(() => zone.classList.remove("invalid"), 260);
        }
        return;
      }

      const currentPlaced = placedFor(currentStep);
      Object.keys(currentPlaced).forEach((key) => {
        if (currentPlaced[key] === itemId) delete currentPlaced[key];
      });
      currentPlaced[target] = itemId;
      state.selectedItem = null;
      state.lastItem = itemId;
      render();
    }

    function revealNext() {
      const currentStep = step();
      const nextId = nextUnplaced(currentStep);
      if (!nextId) return;
      const item = getItem(nextId, currentStep);
      placedFor(currentStep)[item.target] = item.id;
      state.selectedItem = null;
      state.lastItem = item.id;
      render();
    }

    function backPoint() {
      const currentStep = step();
      const currentPlaced = placedFor(currentStep);
      const lastPlacedId = [...currentStep.reveal].reverse().find((itemId) => Object.values(currentPlaced).includes(itemId));
      if (!lastPlacedId) return;
      const item = getItem(lastPlacedId, currentStep);
      delete currentPlaced[item.target];
      state.selectedItem = null;
      state.lastItem = null;
      render();
    }

    function resetStep() {
      const currentStep = step();
      state.placed[currentStep.id] = {};
      state.selectedItem = null;
      state.lastItem = null;
      render();
    }

    function wireCalcInputs() {
      document.querySelectorAll("[data-calc]").forEach((input) => {
        const moveCursorToEnd = () => {
          window.requestAnimationFrame(() => {
            try {
              const end = input.value.length;
              input.setSelectionRange(end, end);
            } catch (error) {
              input.value = input.value;
            }
          });
        };
        input.addEventListener("focus", moveCursorToEnd);
        input.addEventListener("click", moveCursorToEnd);
        input.addEventListener("input", () => {
          const key = input.dataset.calc;
          state.calc[key] = Number(input.value || 0);
        });
        input.addEventListener("change", () => {
          render();
        });
      });
    }

        <div class="placed-card ${toneClass(savings)}">
          <strong>Savings comparison</strong>
          <table class="savings-table">
            <tr><td>Bank</td><td><b>0.05%</b></td><td>${formatCurrency(values.bankMonthly)}/mo</td></tr>
            <tr><td>Portfolio</td><td><b>3%</b></td><td>${formatCurrency(values.threeMonthly)}/mo</td></tr>
            <tr><td>Portfolio</td><td><b>8%</b></td><td>${formatCurrency(values.eightMonthly)}/mo</td></tr>
          </table>
          <span class="small-copy">Illustration only. Verify current rates, product details, eligibility and MAS/HSBC wording.</span>
        </div>
      `);
      if (budget) replaceCard("budget", `
        <div class="placed-card ${toneClass(budget)}">
          <strong>${formatCurrency(values.startBudget)}/month</strong>
          <span>keep emergency funds</span>
          <span>start workable, increase later</span>
          <span class="small-copy">Gap to 8% illustration: ${formatCurrency(Math.max(values.eightMonthly - values.startBudget, 0))}/mo</span>
        </div>
      `);
    }

    function replaceCard(target, html) {
      const zone = document.querySelector(`.drop-zone[data-target="${CSS.escape(target)}"]`);
      if (zone) zone.innerHTML = html;
    }

    function calcValues() {
      const currentAge = Number(state.calc.currentAge) || 25;
      const retirementAge = Math.max(Number(state.calc.retirementAge) || 65, currentAge + 1);
      const expectancyAge = Math.max(Number(state.calc.expectancyAge) || 85, retirementAge + 1);
      const monthly = Number(state.calc.monthly) || 0;
      const yearsToRetire = Math.max(retirementAge - currentAge, 1);
      const inflation = (Number(state.calc.inflation) || 0) / 100;
      const incomeYears = Math.max(expectancyAge - retirementAge, 1);
      const startBudget = Number(state.calc.startBudget) || 0;
      const futureMonthly = monthly * Math.pow(1 + inflation, yearsToRetire);
      const annualNeed = futureMonthly * 12;
      const targetPool = annualNeed * incomeYears;
      const dividendRatePct = Number(state.calc.dividendRate) || 6;
      const dividendRate = Math.max(dividendRatePct / 100, 0.001);
      const dividendTarget = annualNeed / dividendRate;
      const incomePoolDifference = dividendTarget - targetPool;
      const dividendBreakEvenYears = 1 / dividendRate;
      return {
        currentAge,
        retirementAge,
        expectancyAge,
        monthly,
        yearsToRetire,
        inflation,
        incomeYears,
        startBudget,
        futureMonthly,
        annualNeed,
        targetPool,
        bankMonthly: monthlyContribution(targetPool, 0.0005, yearsToRetire),
        threeMonthly: monthlyContribution(targetPool, 0.03, yearsToRetire),
        sixMonthly: monthlyContribution(targetPool, 0.06, yearsToRetire),
        eightMonthly: monthlyContribution(targetPool, 0.08, yearsToRetire),
        dividendRatePct,
        dividendTarget,
        incomePoolDifference,
        incomePoolIsLower: incomePoolDifference < 0,
        dividendBreakEvenYears,
        secretMonthlyDividend: monthlyContribution(dividendTarget, dividendRate, yearsToRetire),
        secretMonthly6: monthlyContribution(dividendTarget, 0.06, yearsToRetire),
        secretMonthly8: monthlyContribution(dividendTarget, 0.08, yearsToRetire)
      };
    }

    function incomePoolNote(values) {
      const rateLabel = `${values.dividendRatePct}%`;
      const pool = formatCurrency(values.dividendTarget);
      const consumed = formatCurrency(values.targetPool);
      const difference = formatCurrency(Math.abs(values.incomePoolDifference));
      const breakEvenYears = Math.round(values.dividendBreakEvenYears * 10) / 10;
      if (Math.abs(values.incomePoolDifference) < 1000) {
        return {
          tone: "green",
          title: "Income pool is close to the spend-down amount",
          text: `At ${rateLabel}, the income pool and the money consumed amount are almost the same.`
        };
      }
      if (values.incomePoolIsLower) {
        return {
          tone: "green",
          title: "Income pool is lower than spending the whole pool",
          text: `At ${rateLabel}, the income pool (${pool}) is ${difference} lower than spending ${consumed} over ${values.incomeYears} years. The income period is longer than the ${breakEvenYears}-year break-even point, so the income-pool idea works in your favour.`
        };
      }
      return {
        tone: "amber",
        title: "Income pool is higher in this profile",
        text: `At ${rateLabel}, the income pool (${pool}) is ${difference} higher than spending ${consumed} because the income-pool method preserves capital. Break-even is about ${breakEvenYears} years, while this profile only needs ${values.incomeYears} years of income.`
      };
    }

    function monthlyContribution(target, annualRate, years) {
      const months = Math.max(years * 12, 1);
      const monthlyRate = annualRate / 12;
      if (monthlyRate <= 0) return target / months;
      return target * monthlyRate / (Math.pow(1 + monthlyRate, months) - 1);
    }

    function formatCurrency(value) {
      const amount = Number(value) || 0;
      if (Math.abs(amount) >= 1000000) {
        const roundedMillions = Math.round((amount / 1000000) * 10) / 10;
        const display = Number.isInteger(roundedMillions) ? roundedMillions.toFixed(0) : roundedMillions.toFixed(1);
        return `$${display}M`;
      }
      if (Math.abs(amount) >= 1000) return `$${Math.round(amount / 100) / 10}k`;
      return `$${Math.round(amount).toLocaleString("en-SG")}`;
    }

    function formatFullCurrency(value) {
      const amount = Math.round(Number(value) || 0);
      return `$${amount.toLocaleString("en-SG")}`;
    }

    function reportMoney(value) {
      const full = formatFullCurrency(value);
      const short = formatCurrency(value);
      return full === short ? full : `${full} (${short})`;
    }

    function todayInputValue() {
      const date = new Date();
      date.setMinutes(date.getMinutes() - date.getTimezoneOffset());
      return date.toISOString().slice(0, 10);
    }

    function formatReportDate(value) {
      if (!value) return "Not set";
      const date = new Date(`${value}T00:00:00`);
      return date.toLocaleDateString("en-SG", { day: "2-digit", month: "short", year: "numeric" });
    }

    function reportLineBreaks(value) {
      return escapeHtml(value).replace(/\n/g, "<br>");
    }

    function lifestyleOptions() {
      return [
        {
          key: "essential",
          label: "Essential",
          amount: Number(state.calc.essentialMonthly) || 0,
          details: "Basic living needs: food, bills and transport."

        {
          key: "discretionary",
          label: "Discretionary",
          amount: Number(state.calc.discretionaryMonthly) || 0,

          key: "luxury",
          label: "Luxury lifestyle",
          amount: Number(state.calc.luxuryMonthly) || 0,
          details: "All three layers: basic needs, discretionary travel and premium choices such as business class and luxury goods."

    }

    function selectedLifestyle(values) {
      const monthly = Number(values.monthly) || 0;
      const options = lifestyleOptions();
      const match = options.find((option) => Math.abs(option.amount - monthly) < 1);
      if (match) return { ...match, isCustom: false };
      return {
        key: "custom",
        label: "Client-selected lifestyle",

    function reportEventRows() {
      return [
        ["House", state.calc.houseAge, "Downpayment, CPF OA and renovation."],
        ["Get married", state.calc.marriedAge, "Proposal, wedding ring, banquet or ceremony, photoshoot, honeymoon and dowry where relevant."],
        ["Kids", state.calc.kidsAge, "Cash for delivery, monthly expenses, confinement and contingency."],

        ["Retirement", state.calc.retirementAge, "Self-planning milestone and future income goal."],
        ["Car", state.calc.carAge, "Lower-priority lifestyle milestone: downpayment, road tax, COE and running costs."]
      ];
    }

    function reportTimelineLabel(value) {
      return escapeHtml(value).replace(/\s+/g, "<br>");
    }

    function reportTimelineDiagram(values) {
      const events = [
        { key: "house", label: "House", age: Number(state.calc.houseAge) || 0, className: "", order: 1 },
        { key: "married", label: "Get married", age: Number(state.calc.marriedAge) || 0, className: "amber", order: 2 },
        { key: "kids", label: "Kids", age: Number(state.calc.kidsAge) || 0, className: "amber", order: 3 },
        { key: "education", label: "Education", age: Number(state.calc.educationAge) || 0, className: "", order: 4 },
        { key: "retirement", label: "Retirement", age: Number(values.retirementAge) || 0, className: "green", order: 5 },
        { key: "car", label: "Car", age: Number(state.calc.carAge) || 0, className: "", order: 6 }
      ].filter((event) => event.age > 0).sort((a, b) => a.age - b.age || a.order - b.order);
      const scaleAges = [Number(values.currentAge) || 0, Number(values.expectancyAge) || 0, ...events.map((event) => event.age)].filter((age) => age > 0);
      const minAge = Math.min(...scaleAges);
      const maxAge = Math.max(...scaleAges, minAge + 1);
      const pct = (age) => 6 + ((Number(age) - minAge) / Math.max(maxAge - minAge, 1)) * 88;
      const positionedEvents = events.map((event) => ({ ...event, pos: pct(event.age) }));
      const currentMarkerPos = pct(values.currentAge);
      if (positionedEvents.length) {
        positionedEvents[0].pos = Math.max(positionedEvents[0].pos, currentMarkerPos + 10.5);
      }
      for (let index = 1; index < positionedEvents.length; index += 1) {
        positionedEvents[index].pos = Math.max(positionedEvents[index].pos, positionedEvents[index - 1].pos + 10);
      }
      if (positionedEvents.length) {
        const overflow = Math.max(positionedEvents[positionedEvents.length - 1].pos - 91, 0);
        if (overflow) positionedEvents.forEach((event) => { event.pos -= overflow; });
        for (let index = positionedEvents.length - 2; index >= 0; index -= 1) {
          positionedEvents[index].pos = Math.min(positionedEvents[index].pos, positionedEvents[index + 1].pos - 10);
        }
        const underflow = Math.max(7 - positionedEvents[0].pos, 0);
        if (underflow) positionedEvents.forEach((event) => { event.pos += underflow; });
      }
      const trinityEvents = positionedEvents.filter((event) => ["house", "married", "kids"].includes(event.key));
      const trinityLeft = trinityEvents.length ? Math.min(...trinityEvents.map((event) => event.pos)) - 3 : 12;
      const trinityRight = trinityEvents.length ? Math.max(...trinityEvents.map((event) => event.pos)) + 3 : 42;
      const trinityBandLeft = Math.max(Math.min(trinityLeft, 86), 7);
      const trinityBandWidth = Math.min(Math.max(trinityRight - trinityLeft, 10), 92 - trinityBandLeft);
      const trinityKeys = ["house", "married", "kids"];
      const trinityBandRight = trinityBandLeft + trinityBandWidth;
      const eventRows = [];
      const reportEvents = positionedEvents.map((event) => {
        const isTrinityEvent = trinityKeys.includes(event.key);
        const insideTrinitySpan = event.pos >= trinityBandLeft && event.pos <= trinityBandRight;
        const row = eventRows.length && event.pos - eventRows[eventRows.length - 1].pos < 11
          ? (eventRows[eventRows.length - 1].row === 1 ? 2 : 1)
          : 1;
        eventRows.push({ pos: event.pos, row });
        return {
          ...event,
          className: `${isTrinityEvent ? "amber" : event.className} ${insideTrinitySpan && !isTrinityEvent ? "below" : `row-${row}`}`.trim()
        };
      });
      const markers = [
        { label: "Age", age: values.currentAge, className: "current line", pos: currentMarkerPos },
        ...reportEvents,
        { label: "Expectancy", age: values.expectancyAge, className: "expectancy line", pos: pct(values.expectancyAge) }
      ];
      return `
        <div class="report-timeline-diagram">
          <div class="report-timeline-track"></div>
          <div class="report-trinity-band" style="left:${trinityBandLeft}%; width:${trinityBandWidth}%;">
            <span>Trinity of events</span>
          </div>
          ${markers.map((marker) => `
            <div class="report-timeline-marker ${escapeHtml(marker.className)}" style="left:${marker.pos}%;">
              <div class="dot">${escapeHtml(marker.age)}</div>
              <strong>${reportTimelineLabel(marker.label)}</strong>
            </div>
          `).join("")}
        </div>
      `;
    }

    function reportSecretSnapshot(values) {

      return `

        ? `<section class="report-section"><h3>Advisor Notes</h3><div class="report-note-box"><p>${reportLineBreaks(state.report.notes.trim())}</p></div></section>`

      const eventRows = reportEventRows()
        .map((row, index) => ({ row, index }))
        .filter(({ row }) => Number(row[1]) > 0)

        .map(({ row: [label, age, need] }) => `
        <tr>
          <td><strong>${escapeHtml(label)}</strong></td>
          <td>Age ${escapeHtml(age)}</td>

        </tr>
      `).join("");
      const sections = [];
      let sectionNumber = 1;
      const heading = (title) => `${sectionNumber++}. ${title}`;
      let pageTwoBreakUsed = false;
      const pageTwoClass = () => {
        if (!reportSectionEnabled("timeline") || pageTwoBreakUsed) return "";
        pageTwoBreakUsed = true;
        return " report-page-2-start";
      };
      const shouldStartFundingPage = reportSectionEnabled("timeline")
        && (reportSectionEnabled("retirement") || reportSectionEnabled("lifestyle") || reportSectionEnabled("math"));
      let fundingPageBreakUsed = false;

      if (reportSectionEnabled("retirement")) {

                <h4>Concept of retirement</h4>
                <p>Retirement is about not working for money. The goal is to create income that supports lifestyle choice.</p>

      if (reportSectionEnabled("lifestyle")) {

              <article class="report-card selected">
                <h4>${escapeHtml(lifestyle.label)}</h4>
                <p><strong>${reportMoney(values.monthly)}/mth today</strong></p>
                <p>${escapeHtml(lifestyle.details)}</p>
              </article>
            </div>
          </section>
        `);
      }

      if (reportSectionEnabled("math")) {
        sections.push(`
          <section class="report-section${pageTwoClass()}">
            <h3>${heading("Choice Of Lifestyle: Math Time")}</h3>
            <div class="report-amount-needed">
              <div>
                <span>Amount needed for this lifestyle</span>
                <p>Based on ${reportMoney(values.futureMonthly)}/mth at retirement for ${values.incomeYears} years.</p>
              </div>
              <strong>${reportMoney(values.targetPool)}</strong>
            </div>
            <table class="report-table">
              <tbody>
                <tr><td><strong>Present value today</strong></td><td>${reportMoney(values.monthly)}/mth</td></tr>
                <tr><td><strong>Inflation assumption</strong></td><td>${escapeHtml(state.calc.inflation)}% p.a.</td></tr>
                <tr><td><strong>Future value at retirement</strong></td><td>${reportMoney(values.futureMonthly)}/mth</td></tr>
                <tr><td><strong>Annual income need</strong></td><td>${reportMoney(values.annualNeed)}/yr</td></tr>
                <tr><td><strong>Retirement to expectancy period</strong></td><td>${values.incomeYears} years</td></tr>
                <tr><td><strong>Money consumed over period</strong></td><td>${reportMoney(values.targetPool)}</td></tr>
              </tbody>
            </table>
          </section>
        `);
      }

      if (reportSectionEnabled("methods")) {
        sections.push(`
          <section class="report-section${pageTwoClass()}${fundingPageClass()}">
            <h3>${heading("Funding Methods")}</h3>
            <table class="report-table">
              <thead><tr><th>Method</th><th>Illustrative rate</th><th>Monthly amount to build ${formatCurrency(values.targetPool)}</th><th>Calculation shown</th></tr></thead>
              <tbody>
                <tr><td><strong>Bank A/C</strong></td><td>0.05% p.a.</td><td>${reportMoney(values.bankMonthly)}/mth</td><td>${formatCurrency(values.targetPool)} over ${values.yearsToRetire} yrs @ 0.05% p.a.</td></tr>
                <tr><td><strong>Portfolio</strong></td><td>3% p.a.</td><td>${reportMoney(values.threeMonthly)}/mth</td><td>${formatCurrency(values.targetPool)} over ${values.yearsToRetire} yrs @ 3% p.a.</td></tr>
                <tr><td><strong>Portfolio</strong></td><td>8% p.a.</td><td>${reportMoney(values.eightMonthly)}/mth</td><td>${formatCurrency(values.targetPool)} over ${values.yearsToRetire} yrs @ 8% p.a.</td></tr>

        <div class="report-kpi-grid">

        ${sections.join("")}

        ${noteHtml}

        <div class="report-disclaimer">

          `${reportMoney(values.dividendTarget)} x ${values.dividendRatePct}% = ${reportMoney(values.annualNeed)}/yr.`,
          `Illustrated monthly investment to build the income pool at ${values.dividendRatePct}%: ${reportMoney(values.secretMonthlyDividend)}/mth.`
        ]);
      }

      if (reportSectionEnabled("notes") && state.report.notes.trim()) {
        lines.push(`Advisor notes: ${state.report.notes.trim()}`);
      }

      return lines.join("\n");
    }

    function syncReportControls() {
      el.reportProspectInput.value = state.report.prospectName;
      el.reportDateInput.value = state.report.meetingDate;
      el.reportNotesInput.value = state.report.notes;
      el.reportSectionInputs.forEach((input) => {
        input.checked = reportSectionEnabled(input.dataset.reportSection);
      });
    }

    function renderReport() {
      el.profileReport.innerHTML = reportHtml();
    }

    function openReport() {
      if (!state.report.meetingDate) state.report.meetingDate = todayInputValue();
      syncReportControls();
      renderReport();
      el.reportModal.hidden = false;
      el.reportProspectInput.focus();
    }

    function closeReport() {
      el.reportModal.hidden = true;
    }

    async function copyReportSummary() {
      const text = reportText();
      try {
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(text);
        } else {
          throw new Error("Clipboard unavailable");
        }
      } catch (error) {
        const fallback = document.createElement("textarea");
        fallback.value = text;
        fallback.setAttribute("readonly", "");
        fallback.style.position = "fixed";
        fallback.style.left = "-9999px";
        document.body.appendChild(fallback);
        fallback.select();
        document.execCommand("copy");
        fallback.remove();
      }
      const original = el.copyReportBtn.textContent;
      el.copyReportBtn.textContent = "Copied";
      window.setTimeout(() => {
        el.copyReportBtn.textContent = original;
      }, 1200);
    }

    el.prevBtn.addEventListener("click", () => {
      if (state.current > 0) {
        state.current -= 1;
        state.selectedItem = null;
        state.lastItem = null;
        render();
      }
    });

    el.nextBtn.addEventListener("click", () => {
      if (state.current < STEPS.length - 1) {
        state.current += 1;
        state.selectedItem = null;
        state.lastItem = null;
        render();
      }
    });

    el.revealBtn.addEventListener("click", revealNext);
    el.backBtn.addEventListener("click", backPoint);
    el.resetBtn.addEventListener("click", resetStep);
    el.presentBtn.addEventListener("click", () => {
      state.present = !state.present;
      render();
    });
    el.reportBtn.addEventListener("click", openReport);
    el.closeReportBtn.addEventListener("click", closeReport);
    el.printReportBtn.addEventListener("click", () => {
      renderReport();
      window.print();
    });
    el.copyReportBtn.addEventListener("click", copyReportSummary);
    el.reportModal.addEventListener("click", (event) => {
      if (event.target === el.reportModal) closeReport();
    });
    el.reportProspectInput.addEventListener("input", () => {
      state.report.prospectName = el.reportProspectInput.value;
      renderReport();
    });
    el.reportDateInput.addEventListener("change", () => {
      state.report.meetingDate = el.reportDateInput.value;
      renderReport();
    });
    el.reportNotesInput.addEventListener("input", () => {
      state.report.notes = el.reportNotesInput.value;
      renderReport();
    });
    el.reportSectionInputs.forEach((input) => {
      input.addEventListener("change", () => {
        state.report.sections[input.dataset.reportSection] = input.checked;
        renderReport();
      });
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !el.reportModal.hidden) {
        closeReport();
        return;
      }
      if (event.key === "ArrowRight" && !event.target.matches("input")) el.nextBtn.click();
      if (event.key === "ArrowLeft" && !event.target.matches("input")) el.prevBtn.click();
      if (event.key.toLowerCase() === "r" && !event.target.matches("input")) el.revealBtn.click();
      if (event.key === "Escape") {
        state.selectedItem = null;
        render();
      }
    });

    render();
  </script>
</body>
</html>
